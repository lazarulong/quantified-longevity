message: "袣芯薪褋褍谢褜褌邪褑懈褟 袩褋懈褏芯谢芯谐邪 笑械薪邪.\r\n袩褋懈褏芯谢芯谐懈褔械褋泻邪褟 孝械褉邪锌懈褟.\r\n\r\n袧邪泄褌懈 袩褋懈褏芯谢芯谐邪 袨薪谢邪泄薪. 袩芯写写械褉卸泻邪 袨薪谢邪泄薪.\r\n袩褋懈褏芯谢芯谐懈 袨薪谢邪泄薪 袣芯薪褋褍谢褜褌邪褑懈懈 \r\n袧械写芯褉芯谐芯. 效褌芯 袛械谢邪褌褜 袝褋谢懈 袩芯褌械褉褟谢 小械斜褟.\r\n袩褋懈褏芯谢芯谐 袦芯褋泻胁邪 袣芯薪褋褍谢褜褌邪褑懈懈.\r\n袣芯薪褋褍谢褜褌邪褑懈泄.\r\n鉁旓笍 袨褖褍褖械薪懈械 锌褍褋褌芯褌褘 懈 锌芯褌械褉懈 褋屑褘褋谢邪.\r\n鉁旓笍小褌褉械褋褋. 鉁旓笍 袩褋懈褏芯褋芯屑邪褌懈泻邪, 褌褉械胁芯卸薪芯褋褌褜, 胁褘谐芯褉邪薪懈械.\r\n鉁旓笍小械屑械泄薪褘械 泻芯薪褎谢懈泻褌褘. 鉁旓笍袩褉芯斜谢械屑褘 胁 芯斜褖械薪懈懈 褋 谢褞写褜屑懈."
