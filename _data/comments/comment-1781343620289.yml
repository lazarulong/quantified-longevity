message: "Сюрвейерские услуги – это профессиональная инспекция.\r\nРаботаем с наливными грузами.\r\nЭкономим ваши деньги. Работаем по \r\nIncoterms 2020.\r\nПредотгрузочная инспекция – ваш последний шанс отказаться от брака.\r\nПод погрузкой. Запрет отгрузки при \r\nкритическом браке. Процент от контракта.\r\n\r\nУрегулирование убытков со страховой – получите реальную \r\nвыплату. Фиксируем повреждения по акту.\r\nОспариваем недооценку ущерба.\r\n\r\nРаботаем без предоплаты."
