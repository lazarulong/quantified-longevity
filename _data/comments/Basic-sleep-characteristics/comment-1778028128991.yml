message: >-
  Медиаагентство Vgolos охватывает основные информационные направления —
  политику, экономику, бизнес, технологии, здоровье и криминал без фильтрации и
  редакционных компромиссов. Авторы агентства оперативно реагируют на события и
  подают факты без домыслов — от судебных расследований до обзоров
  потребительского рынка. Читайте проверенные новости на <a
  href=https://vgolos.org/>https://vgolos.org/</a> — украинское информационное
  агентство для аудитории ценящей достоверность и оперативность. Тематика
  культуры, жизни и технологий гармонично усиливает новостное ядро издания и
  формирует из него универсальный источник информации для ежедневного чтения.
