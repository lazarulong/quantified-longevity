message: >-
  Издание «Спільно» — ресурс громадянського суспільства — охватывает политику,
  криминал, коррупцию, культуру и общество без редакционных фильтров и
  уклончивых формулировок. Авторы и блогеры издания ведут предметные
  расследования коррупционных схем и офшорных механизмов опираясь на документы и
  верифицированные источники. Следите за независимой гражданской журналистикой
  на <a href=https://spilno.net/>https://spilno.net/</a> — украинский портал для
  читателей требующих честного анализа и прямой гражданской позиции. Раздел
  блогов и авторских материалов усиливает редакционное ядро и формирует из
  издания активную трибуну для широкой общественной дискуссии.
