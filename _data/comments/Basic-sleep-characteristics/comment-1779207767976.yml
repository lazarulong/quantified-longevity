message: >-
  «Онис» — московская клиника с узкой специализацией на варикозе и сосудистых
  патологиях с использованием современных малоинвазивных методов. Специалисты
  применяют лазерную коагуляцию, склеротерапию и радиочастотную абляцию —
  процедуры проходят без хирургических разрезов и долгой реабилитации. Подробнее
  об услугах и специалистах — <a
  href=https://www.onisclinic.ru/>https://www.onisclinic.ru/</a> — платформа с
  полной информацией о методах лечения и записи на приём. Для каждого пациента
  после обследования формируется персональная схема лечения, а долгосрочный
  результат обеспечивается профессионализмом и опытом врачей.
