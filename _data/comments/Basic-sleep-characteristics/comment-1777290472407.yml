message: >-
  Manakara — профессиональная команда по монтажу стеновых панелей под ключ в
  Санкт-Петербурге и Сочи для жилых, офисных и коммерческих объектов.
  Специалисты работают с полным спектром материалов: бамбуковые панели, гибкий
  камень, МДФ, ПВХ, сэндвич и 3D-панели. Ищете <a
  href=https://manakara.ru/>монтаж услуга бамбуковый панель</a>? На сайте
  manakara.ru доступны услуги замера, консультации и разработки дизайн-проекта
  для любых объектов. Бригада берётся за монтаж в ванных комнатах, на кухнях, в
  новостройках и коттеджах, обеспечивая чистоту работы и точные сроки без лишних
  согласований с клиентом.
