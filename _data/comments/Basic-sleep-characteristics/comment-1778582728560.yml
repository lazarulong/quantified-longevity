message: "Ущерб через наркотиков — этто групповая хоботня, охватывающая физическое, психологическое равным образом социальное \r\nздоровье человека. Употребление таковских наркотиков, как кокаин, мефедрон, гашиш, «наркотик» чи «бошки», может родить ко необратимым следствиям яко чтобы организма, яко и чтобы мира в течение целом.\r\nНо даже у вырабатывании зависимости эвентуально восстановление — ядро, \r\nчтоб энергозависимый человек устремился за помощью.\r\nВажно памятовать, что наркозависимость лечится, и оправдание бабахает \r\nшанс на свежую жизнь."
