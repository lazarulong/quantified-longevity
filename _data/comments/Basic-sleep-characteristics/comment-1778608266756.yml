message: >-
  Камин в доме — это не просто источник тепла, а центр притяжения всей семьи в
  холодные вечера. Компания Kaminru занимается продажей, проектированием и
  монтажом каминов и печей ведущих европейских и отечественных производителей.
  На сайте <a href=https://kaminru.ru/>https://kaminru.ru/</a> представлен
  широкий каталог готовых решений: от классических дровяных моделей до
  современных биокаминов. Специалисты компании помогут подобрать оборудование
  под конкретный интерьер и технические параметры помещения, обеспечив
  безопасный и качественный монтаж.
