message: >-
  Roseline — ивановская студия флористики с полным спектром услуг: от авторских
  букетов до оформления торжеств. Каталог включает розы, тюльпаны, гортензии,
  эустомы, герберы, лилии, ранункулюсы и десятки других цветов. На <a
  href=https://roseline37.ru/>https://roseline37.ru/</a> представлен полный
  каталог с актуальными ценами — заказ оформляется онлайн с доставкой по городу.
  Студия также занимается съедобными букетами, сухоцветами, декоративными кашпо
  и оформлением праздников под ключ. Каждая композиция создаётся вручную
  опытными флористами строго по пожеланиям заказчика.
