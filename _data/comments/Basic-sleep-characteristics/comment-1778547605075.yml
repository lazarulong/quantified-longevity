message: >-
  Ищете <a href=https://vztm.ru/>термочехлы</a>? Посетите сайт vztm.ru — это
  Воткинский Завод Теплоизоляционных Материалов (ВЗТМ), который производит
  системы теплоизоляции из базальтового (минерального) супер-тонкого волокна.
  Изделия завода применяются на предприятиях энергетики, в оборонной отрасли,
  нефтегазовом секторе, а также в гражданском и промышленном строительстве.
  Просмотрите ассортимент завода и карту географии поставок на сайте компании.
  Завод использует собственные уникальные технологии производства и строго
  контролирует качество выпускаемой продукции на всех этапах.
