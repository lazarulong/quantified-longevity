message: "Риск от наркотиков — это групповая проблема, обхватывающая физическое, психологическое (а) также общественное \r\nсостояние здоровья человека.\r\n\r\nУтилизация таких наркотиков, как \r\nкокаин, мефедрон, гашиш, «наркотик» или «бошки», может огласить ко необратимым последствиям как чтобы организма, так \r\nравным образом чтобы общества на целом.\r\nНо даже при развитии зависимости эвентуально \r\nэлектровосстановление — ядро, чтобы зависимый человек обратился согласен помощью.\r\nВажно памятовать, что наркозависимость лечится,\r\nтакже помощь бабахает шанс сверху новейшую \r\nжизнь."
