message: >-
  Мода давно перестала быть привилегией стандартных размеров — и
  интернет-магазин Smart-Woman это прекрасно понимает. Работая с 2006 года, он
  почти два десятилетия одевает шикарных женщин по всей России, предлагая одежду
  размерного ряда от 56 до 86. В каталоге представлены модели ведущих
  отечественных производителей, а часть ассортимента выпускается под собственной
  маркой — пошив размещается только у проверенных фабрик России и Киргизии.
  Заглянув на <a href=https://smart-woman.ru/>https://smart-woman.ru/</a>, легко
  убедиться: здесь есть всё — от элегантных блузок и платьев-туник до джинсовых
  кардиганов и трикотажа, причём по по-настоящему доступным ценам. Удобный
  сервис заказа, прозрачные условия доставки и обмена делают покупку простой и
  приятной для каждой клиентки.
