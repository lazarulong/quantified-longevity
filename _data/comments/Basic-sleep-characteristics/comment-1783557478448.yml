message: "¡Mba'éichapa los perros! Soy Derlis desde Encarnación. \r\nComo un enfermo de las apuestas deportivas y fanático a muerte de la Albirroja, les juro que estoy viviendo el mejor \r\nsueño de mi vida. \r\nAl empezar el campeonato, quería romper el televisor \r\nde la rabia cuando los yanquis nos metieron ese humillante \r\n4-1. Pero ahí salió a relucir el orgullo de nuestra \r\ntierra: sufrimos como unos condenados para clavarle el 1-0 a Turquía y con el alma en un hilo clasificamos \r\nraspando, empatando a cero con los australianos. \r\n¡Pero la verdadera historia se escribió contra Alemania en dieciseisavos!\r\nEl mundo entero de los pronósticos nos daba por muertos, pero empatamos 1-1 dejando el alma y la piel en los 120 minutos.\r\n¡Y en los penales, mandamos a los alemanes \r\na llorar a su casa ganando 4-3! \r\n¡Reventé mi cuenta en la casa de apuestas porque le puse plata a que pasábamos \r\ny pagaban una cuota de locura total! \r\nEste jueves nos cruzamos con la Francia en octavos de final y le voy a meter \r\nlos ahorros de toda mi vida a Paraguay sin pensarlo.\r\n¡Que nos den por perdedores, mucho mejor, \r\nasí paga más mi apuesta! \r\n¡Rohayhu Albirroja, a matar o morir en la cancha!"
