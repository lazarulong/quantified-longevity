message: >-
  Московский семейный медцентр «Киндер» ведёт приём детей и взрослых по
  направлениям педиатрия, терапия, гинекология и аллергология. Клиника работает
  по лицензии Л041-01137-77/00763335 и объединяет опытных специалистов со стажем
  от 10 до 35 лет. На <a
  href=https://kinder-medcenter.ru/>https://kinder-medcenter.ru/</a> можно
  записаться к врачу онлайн и ознакомиться с полным прейскурантом услуг. Клиника
  находится на улице Лавриненко рядом с метро Некрасовка — это делает её
  доступной для жителей востока Москвы и Люберец.
