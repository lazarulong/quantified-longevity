message: >-
  Агентство POLITEKA с выверенной редакционной структурой выпускает тексты о
  политике, экономике, обществе, культуре и криминале без размытых оценок и
  уклончивых формулировок. Журналисты издания исследуют мировые технологические
  тенденции, геополитические обострения и экономические процессы основываясь на
  верифицированных источниках и конкретных данных. Получайте независимую
  аналитику на <a href=https://politeka.org/>https://politeka.org/</a> —
  украинское информационное агентство для аудитории требующей глубокого и
  честного осмысления событий. Тематические статьи и детальные экспертные
  разборы органично усиливают новостную ленту и формируют из портала
  многопрофильный медиаинструмент для разноплановой аудитории.
