message: "به نظرم در موضوعاتی مثل شرط بندی و بازی‌های پولی، اولین اصل احتیاطه و بعد بررسی دقیق.\r\nسلامو احترام، چون چند وقتیه درباره این فضا کنجکاو \r\nشدم گفتم اینجا هم نظرم رو ثبت کنم.\r\nچند وقت پیش وقتی داشتم تجربه بقیه کاربرا رو می‌خوندم چند بخش \r\nاین سایت رو نگاه کردم. در نگاه اول متوجه شدم متن‌ها خیلی \r\nپیچیده نیستن. برداشت شخصی من اینه \r\nکه شفافیت اطلاعات خیلی مهمه.\r\nیکی از رفیقام به اسم نیما چند بار درباره سایت‌های شرطی \r\nصحبت کرده بود. برای همین به جز ظاهر سایت، متن‌ها و \r\nتوضیحاتش رو هم نگاه کردم. چیزی که برای \r\nمن جالب بود که چند بخشش برای مقایسه مفید بود.\r\nاز طرفی بهتره کاربر قبل از هر اقدامی \r\nخودش هم تحقیق کنه. برای اون دسته \r\nاز کاربرها که دنبال اطلاعات درباره \r\nشرط بندی هستن، می‌تونه نقطه شروع بدی نباشه.\r\nوقتی این حوزه رو نگاه می‌کنی سایت‌هایی مثل پلتفرم enfejaｒonlіne و sibbet.com نشون میدن \r\nاین حوزه چقدر گسترده شده. من و یکی از دوستام مدتی قبل چند سایت \r\nمختلف رو فقط از نظر ظاهر، توضیحات و قابل فهم \r\nبودن بررسی کردیم و همین باعث شد به این چیزها حساس‌تر بشم.\r\nدر کل نسبتاً قابل قبول بود.\r\nاگر کسی قصد بررسی داره بهتره با دید \r\nباز و منطقی جلو بره. حرف آخرم اینه که هر کسی باید خودش تحقیق \r\nکنه، اما این سایت برای شروع بررسی و آشنایی اولیه بد \r\nنبود."
