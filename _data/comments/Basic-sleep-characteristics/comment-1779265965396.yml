message: >-
  В последние годы банками всё чаще применяется автоматическая блокировка счета
  P2P в Казахстане из-за подозрений в мошенничестве (дропперство, треугольники)
  или нарушений Закона РК о ПОД/ФТ. Входящие переводы от незнакомых лиц система
  расценивает как подозрительные операции. Узнайте на странице <a
  href=https://blog.femida-justice.com/blokirovka-scheta-p2p-v-kazahstane/>https://blog.femida-justice.com/blokirovka-scheta-p2p-v-kazahstane/</a>
  ваши правильные шаги в этом направлении от Бахирева Анатолия Анатольевича,
  управляющего партнера юридической фирмы "Закон и Справедливость".
