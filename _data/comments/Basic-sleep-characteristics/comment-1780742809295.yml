message: "對於不想被單一品牌主機綁架的玩家來說，了解煙彈的通用協議至關重要。目前市場上主流的「一代」通用接頭依然佔據半壁江山。經實測，SP2S煙彈、DIYA 叮啞煙彈以及LANA煙彈在物理接口上是互相兼容的，這意味著你可以將 LANA 的獨特風味煙彈裝載到 SP2S 的主機上使用，只要主機能提供足夠的功率推桿，就能混搭出不同風味。然而，需要注意的是，像ILIA 哩亞與KIS5雖然也是封閉式系統，但它們各自發展了專屬的第五代或最新晶片協議，ILIA 煙彈內部有特定的識別碼，搭配 \r\nILIA 主機時才能啟動「智能功率微調」功能。若將 ILIA 煙彈裝在其他品牌主機上，雖然能通電加熱，但可能會喪失最佳口感曲線。因此，追求極致口感建議原廠配原廠；追求嘗鮮與便利性，則可以選擇 \r\nSP2S 或 LANA 這種通用性高的平台。"
