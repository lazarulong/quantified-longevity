message: >-
  CryoOne специализируется на производстве азотных криокапсул российского
  производства для beauty-бизнеса, спортивных центров и восстановительной
  медицины. Оборудование окупается за 6 месяцев, не требует медицинской лицензии
  и генерирует стабильный поток клиентов за счёт WOW-эффекта процедуры. На <a
  href=https://cryoone.ru/>https://cryoone.ru/</a> представлены четыре
  комплектации — Standard, Business, Pro и Comfort — с гарантией 24 месяца и
  бесплатными доставкой, монтажом и обучением. В комплект поставки включён сосуд
  Дьюара, а цена фиксируется гарантией лучшего предложения на рынке.
