message: >-
  JetronSport специализируется на производстве футбольной формы для любых команд
  — детских, любительских и профессиональных. Вся продукция шьётся из
  инновационных воздухопроницаемых материалов с высокой эластичностью,
  сертифицирована по ГОСТам и поставляется с гарантией на нанесения. Компания
  принимает заказы от одного комплекта и изготавливает форму в течение
  одного-трёх дней. На <a
  href=https://jetronsport.ru/>https://jetronsport.ru/</a> представлены модели
  взрослой, детской и вратарской формы с нанесением номеров и фамилий. Линейки
  Jetron Space, Star и Winner отличаются усиленными швами, светоотражающими
  вставками и тканью Quick-Dry — всё для реального игрового комфорта.
