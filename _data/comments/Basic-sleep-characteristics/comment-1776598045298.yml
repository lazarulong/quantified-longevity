message: >-
  Когда речь заходит о надёжных конструкционных материалах, алюминий и
  нержавеющая сталь остаются бесспорными лидерами в строительстве, дизайне и
  промышленности. Компания ПрофМеталМаркет предлагает широкий ассортимент
  профессионального металлопроката: на сайте <a
  href=https://profmetal-market.ru/>https://profmetal-market.ru/</a>
  представлены алюминиевые профили, трубы, листы, тавры, швеллеры и
  анодированный алюминий, а также изделия из нержавеющей стали — от зеркальных
  труб до перил и крепежа системы JOKER. Компания работает в Москве,
  осуществляет самовывоз и оперативную доставку по всей России.
