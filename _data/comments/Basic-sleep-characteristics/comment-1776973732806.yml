message: >-
  РУС-МеДтеХ — официальный дистрибьютор медицинской техники и оборудования от
  ведущих производителей. Компания предлагает полное оснащение
  лечебно-профилактических учреждений: от диагностического и реанимационного
  оборудования до медицинской мебели и расходных материалов. На платформе <a
  href=https://rus-medteh.ru/>https://rus-medteh.ru/</a> доступны запасные
  части, медицинская одежда и техника для домашнего использования. В
  ассортименте представлено свыше 37 категорий продукции для медицинских
  учреждений, лабораторий и домашнего применения. Здесь работают с
  государственными учреждениями и частными клиниками, обеспечивая выгодные цены
  и профессиональный сервис.
