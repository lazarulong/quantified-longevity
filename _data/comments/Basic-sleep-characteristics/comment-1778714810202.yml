message: >-
  Компания CryoOne выпускает отечественные азотные криокапсулы для предприятий в
  области красоты, спорта и реабилитации. Криокапсула выходит на окупаемость уже
  через полгода, работает без медицинской лицензии и привлекает новых клиентов
  благодаря яркому эффекту от процедуры. На <a
  href=https://cryoone.ru/>https://cryoone.ru/</a> представлены четыре
  комплектации — Standard, Business, Pro и Comfort — с гарантией 24 месяца и
  бесплатными доставкой, монтажом и обучением. В комплект поставки включён сосуд
  Дьюара, а цена фиксируется гарантией лучшего предложения на рынке.
