message: >-
  «Український оглядач» последовательно реализует редакционный принцип —
  оглядаємо, аналізуємо, висловлюємо думку — и охватывает Украину, мир,
  политику, экономику, криминал и бизнес с экспертной подачей без размытых
  формулировок. Авторы издания расследуют коррупционные механизмы и готовят
  предметную аналитику с опорой на верифицированные данные и доказательную
  фактуру. Читайте независимую аналитику на <a
  href=https://obozrevatel.org/>https://obozrevatel.org/</a> — украинский
  медиаресурс для аудитории ценящей глубину анализа и честную журналистскую
  позицию. Блоки технологий, культуры и здоровья усиливают новостное ядро
  ресурса и формируют из него полноценный ежедневный инструмент для самого
  широкого читателя.
