  С 1997 года симферопольская компания «Транзит Медиа» задаёт стандарты
  рекламного производства в Крыму: широкоформатная полноцветная и УФ-печать,
  брендирование корпоративного транспорта, изготовление баннеров, вывесок и
  изделий из акрила — всё это выполняется на собственном оборудовании с
  использованием качественных европейских материалов. Подробный каталог услуг и
  актуальные цены производителя размещены на <a
  href=https://transitmedia.ru/>https://transitmedia.ru/</a>, где можно сразу
  оформить заявку. Более 25 лет безупречной работы, гарантия на все изделия и
  услуги, доставка по Симферополю и городам Крыма — весомые аргументы в пользу
  надёжного партнёра для вашего бизнеса.
