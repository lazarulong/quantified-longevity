message: "Порча через наркотиков — это сложная хоботня, охватывающая \r\nфизиологическое, психическое \r\nи соц здоровье человека. Утилизация эких наркотиков, яко кокаин, мефедрон, ямба, «наркотик» или «бошки», что ль огласить ко неконвертируемым последствиям яко для организма, яко равным образом чтобы среды в целом.\r\nХотя хоть у выковывании подчиненности эвентуально восстановление — \r\nглавное, чтобы зависимый человек обратился согласен помощью.\r\nЭпохально памятовать, яко наркомания врачуется, и оправдание одаривает \r\nшанс на свежую жизнь."
