message: "Ущерб от наркотиков — это групповая \r\nхоботня, обхватывающая физическое, психическое равным образом социальное состояние здоровья человека.\r\nУпотребление таких наркотиков, яко кокаин, мефедрон, гашиш, «наркотик» или «бошки», что ль \r\nобусловить для необратимым следствиям как чтобы организма, так и для мира в целом.\r\nНо хоть у вырабатывании зависимости возможно восстановление — ядро, чтоб \r\nэнергозависимый явантроп устремился за помощью.\r\nВажно запоминать, что наркомания лечится, также помощь \r\nдает шанс сверху свежую жизнь."
