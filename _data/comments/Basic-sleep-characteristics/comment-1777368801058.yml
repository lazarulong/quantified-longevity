message: >-
  Mebelink специализируется на перетяжке и реставрации мягкой мебели в Москве и
  даёт гарантию 3 года на все выполненные работы. Компания использует
  износостойкие и гипоаллергенные материалы, подбирает эксклюзивные ткани под
  любой интерьер и выполняет ремонт диванов, кресел, кроватей, стульев и офисной
  мебели. <a href=https://mebelink.com/>https://mebelink.com/</a> рассчитает
  стоимость по фото за 15 минут — цена фиксируется сразу и не меняется. Доставка
  и сборка включены в стоимость. Рейтинг 5,0 на Яндексе — лучшее свидетельство
  надёжности компании.
