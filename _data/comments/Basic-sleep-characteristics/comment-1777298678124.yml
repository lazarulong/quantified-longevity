message: >-
  JetronSport специализируется на производстве футбольной формы для любых команд
  — детских, любительских и профессиональных. Форма изготавливается из
  премиальных дышащих тканей с высокой терморегуляцией и эластичностью,
  соответствует ГОСТам и имеет гарантию на цвета и нанесения. Заказ от одного
  комплекта со сроком изготовления 1–3 дня. На <a
  href=https://jetronsport.ru/>https://jetronsport.ru/</a> представлены модели
  взрослой, детской и вратарской формы с нанесением номеров и фамилий. Коллекции
  Jetron Space, Star и Winner сочетают усиленные конструктивные элементы,
  светоотражающие вставки и Quick-Dry материал для подлинного спортивного
  комфорта.
