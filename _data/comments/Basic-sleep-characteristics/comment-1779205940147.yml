message: >-
  Издание «Інквізиція» придерживается принципа Deus vult — публикует
  расследовательские тексты, криминальную хронику и бескомпромиссную аналитику
  без редакционных ограничений. Редакция последовательно разбирает коррупционные
  схемы, судебные затяжки и социальные проблемы — с фактами и документами на
  руках. Изучайте независимые расследования на <a
  href=https://inquisition.info/>https://inquisition.info/</a> — украинский
  портал для тех кто требует от журналистики реальных результатов. Тематика
  политики, бизнеса, экономики и здоровья раскрыта без полутонов — журналисты не
  избегают прямых оценок и конкретных выводов что ставит ресурс вне ряда
  типичных новостных сайтов.
