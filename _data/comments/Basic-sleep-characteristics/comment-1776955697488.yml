message: >-
  ETC Agency — медиабаинговое агентство с собственным продакшн-центром, которое
  стартовало в 2021 году и сформировало команду из 16 профессионалов. Агентство
  охватывает более 100 эксклюзивных авторов и свыше 1000 партнёрских блогеров на
  YouTube, Telegram, TikTok и ВКонтакте. <a
  href=https://etc.moscow/>https://etc.moscow/</a> берёт на себя полный цикл: от
  разработки стратегии и медиабаинга до создания креативных концепций, сценариев
  и специальных проектов. За четыре года агентство выстроило базу из 65
  постоянных клиентов и стабильно реализует 350 рекламных интеграций в месяц.
