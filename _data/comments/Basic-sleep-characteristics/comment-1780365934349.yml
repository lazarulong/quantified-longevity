message: "چیزی که برای من سوال بود این بود که آیا این \r\nسایت فقط تبلیغاتی نوشته شده یا واقعاً اطلاعات قابل بررسی هم داره.\r\nدرود،چون چند وقتیه درباره این فضا کنجکاو شدم گفتم اینجا هم نظرم رو ثبت کنم.\r\nچند روز پیش وقتی با چند نفر درباره این موضوع صحبت \r\nمی‌کردیم چند بخش این سایت رو نگاه کردم.\r\nبعد از چند دقیقه بررسی به نظرم نسبتاً مرتب بود.\r\nراستش برای من مهمه که کاربر باید خودش \r\nبا دقت بررسی کنه. یکی از همکارام بیشتر از همه روی \r\nامنیت و قابل فهم بودن توضیحات حساس بود.\r\nبرای همین به جز ظاهر سایت، متن‌ها و توضیحاتش رو \r\nهم نگاه کردم. چیزی کهبرای من جالب بود که متن‌ها خیلی خشک و تبلیغاتی نبودن.\r\nاز طرفی در چنین موضوعاتی احتیاط \r\nاز همه چیز مهم‌تره. برای اوندسته از کاربرها که دنبال مقایسه بین سایت‌های مختلف \r\nهستن، بهتره در کنار چند گزینه دیگه بررسی بشه.\r\n\r\nوقتی این حوزه رو نگاه می‌کنی نمونه‌هایی مثل پلتفرم enfejaronnline همراه با sibbdt \r\nآنلاین باعث شدن این فضا \r\nبیشتر دیده بشه. یکی از بچه‌ها که اسمش سامان بود، \r\nمی‌گفت مشکل خیلی از سایت‌ها اینه که فقط شعار می‌دن ولی توضیح درست \r\nنمی‌دن؛ برای همین من هم بیشتر به متن‌ها دقت کردم.\r\nجمع‌بندی من اینه که حس \r\nبدی ازش نگرفتم. فکر می‌کنم منطقی‌تره عجله نکنه و \r\nچند گزینه رو مقایسه کنه. در کل حس من نسبت به بررسی این سایت مثبت بود، اما \r\nهمچنان فکر می‌کنم توی چنین \r\nموضوعاتی باید با احتیاط \r\nو دقت جلو رفت."
