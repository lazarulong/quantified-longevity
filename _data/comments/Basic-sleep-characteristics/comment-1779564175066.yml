message: >-
  CryoOne специализируется на производстве азотных криокапсул российского
  производства для beauty-бизнеса, спортивных центров и восстановительной
  медицины. Срок окупаемости составляет 6 месяцев: лицензия не нужна, а
  впечатляющий результат процедуры обеспечивает постоянный приток клиентов. На
  <a href=https://cryoone.ru/>https://cryoone.ru/</a> представлены четыре
  комплектации — Standard, Business, Pro и Comfort — с гарантией 24 месяца и
  бесплатными доставкой, монтажом и обучением. Каждая капсула поставляется с
  сосудом Дьюара в комплекте, и производитель гарантирует лучшую цену на рынке.
