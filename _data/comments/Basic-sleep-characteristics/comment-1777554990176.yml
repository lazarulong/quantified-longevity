message: >-
  Украинский информационный портал охватывает все ключевые сферы жизни — от
  политики и экономики до спорта и здоровья, предлагая читателям актуальные
  новости и глубокие аналитические материалы без лишних слов и домыслов.
  Редакция портала работает профессионально и открыто: журналистские
  расследования, аналитика рынка и социальные материалы публикуются постоянно и
  собирают лояльных читателей. Переходите на <a
  href=https://ukrnet.org/>https://ukrnet.org/</a> — украинская всемирная сеть
  новостей для тех кто ценит качественную журналистику. Материалы охватывают как
  украинские реалии, так и мировую повестку, делая портал незаменимым источником
  для думающего читателя.
