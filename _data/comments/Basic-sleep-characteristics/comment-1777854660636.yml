message: >-
  Портал «Аргумент» придерживается ясной редакционной позиции — заради розвитку
  та процвітання України — и выпускает тексты о политике, криминале, бизнесе,
  обществе и культуре без размытых оценок. Редакция отслеживает громкие события
  без задержек и работает с фактурой — от коррупционных схем в силовых
  ведомствах до многолетних судебных разбирательств. Следите за актуальной
  повесткой на <a href=https://arhument.com/>https://arhument.com/</a> —
  украинский новостной ресурс для читателя требующего точных фактов и честных
  оценок. Блоки спорта, культуры и технологий органично усиливают редакционную
  повестку и формируют из издания полноценный ежедневный источник для самого
  широкого круга читателей.
