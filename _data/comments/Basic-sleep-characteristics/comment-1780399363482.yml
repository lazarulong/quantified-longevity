message: >-
  Винтовые прессы — надёжный инструмент для полиграфии, реставрации книг и
  архивного переплёта, проверенный десятилетиями практики. Компания «Текамет»
  предлагает широкий ассортимент винтовых прессов собственного производства,
  сочетающих точность механики с долговечностью конструкции. На странице <a
  href=https://tecamet.ru/pressy/vintovye-pressy>https://tecamet.ru/pressy/vintovye-pressy</a>
  представлены модели для различных задач — от тиснения и склейки до прессования
  блоков и реставрационных работ. Оборудование отличается простотой
  эксплуатации, не требует сложного обслуживания и рассчитано на длительную
  работу в профессиональных мастерских.
