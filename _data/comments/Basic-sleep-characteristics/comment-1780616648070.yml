message: >-
  Автосервис «Шоколад» в Анапе — это современный центр технического
  обслуживания, где профессионализм сочетается с заботой о каждом клиенте.
  Команда опытных мастеров предлагает полный спектр услуг: от диагностики и
  замены масла до сложного ремонта двигателя и трансмиссии. Особенно
  привлекательны специальные предложения сервиса — бесплатная диагностика со
  скидкой 15% на ремонт, услуги эвакуатора и расчет стоимости работ по
  фотографии. Подробнее обо всех услугах можно узнать на сайте <a
  href=https://chocolate-auto.ru/>https://chocolate-auto.ru/</a>, где
  представлена актуальная информация о ценах и графике работы. Сервис расположен
  по адресу Супсехское шоссе 10 и работает ежедневно с 9:00 до 19:00,
  обеспечивая качественное обслуживание автомобилей любых марок.
