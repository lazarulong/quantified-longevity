  Компания «Партнер» — редкий пример поставщика, который говорит с
  образовательными учреждениями на одном языке: на сайте <a
  href=http://xn----7sbbumkojddmeoc1a7r.xn--p1acf/>http://xn----7sbbumkojddmeoc1a7r.xn--p1acf/</a>
  собрана полноценная экосистема для школ и детских садов, от интерактивных
  панелей, VR/AR-решений и систем мониторинга знаний до специализированной
  мебели, робототехники и оборудования для сенсорных комнат. Каталог
  структурирован по задачам: мультимедийное оснащение классов, 3D-лаборатория и
  принтеры, конструкторы от LEGO-совместимых до TRIK и VEX, документ-камеры,
  программное обеспечение (включая 1С и управление классом), комплектующие для
  проекторов и интерактивных досок, а также мебель и AV-стойки для презентаций.
