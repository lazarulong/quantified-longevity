message: "من خودم خیلی حرفه‌ای نیستم و بیشتر از \r\nزاویه یک کاربر کنجکاو این سایت رو \r\nبررسی کردم. سلام به کاربرای این صفحه، معمولاً فقط وقتی چیزی برام جالب باشه نظر می‌دم.\r\n\r\nدیروز وقتی داشتم تجربه بقیه کاربرا رو می‌خوندم این صفحه رو دیدم.\r\nهمون ابتدا حس کردم برای آشنایی اولیه می‌تونه مفید باشه.\r\n\r\nبهنظرم بهتره آدم چند منبع مختلف رو هم ببینه.\r\nیکی از همکارام دنبال این بود که چند پلتفرم مختلف رو مقایسه کنه.\r\nبههمین خاطر چند بخش رو با حوصله‌تر خوندم.\r\nنکته‌ای که توجهم رو جلب کرد که \r\nحداقل برای شروع بررسی، اطلاعات اولیه خوبی می‌داد.\r\n\r\nولی خب بهتره کاربر قبل از هر اقدامی خودش هم \r\nتحقیق کنه. برای افرادی که قصد دارن قبل از شروع اطلاعات بیشتری داشته باشن \r\nدنبال مقایسه بین سایت‌های مختلف هستن،این سایت می‌تونه یکی از گزینه‌های \r\nبررسی باشه. در کنار این موضوع نمونه‌هایی مثل برند enfejɑronline یا siƅƅet.com در بین بعضی کاربران شناخته‌تر شدن.\r\nیکی از بچه‌ها که اسمش نیما بود، می‌گفت مشکل خیلی از سایت‌ها اینه که فقط \r\nشعار می‌دن ولی توضیح درست نمی‌دن؛ برای همین من هم بیشتر به متن‌ها \r\nدقت کردم. در کل ارزش وقت گذاشتن داشت.\r\nبه نظرم بهتره صرفاً بر اساس تبلیغ تصمیم نگیره.\r\n\r\nدر مجموع، اگر کسی دنبال یک نگاه اولیه \r\nو نه یک نتیجه قطعی باشه، بررسی این سایت می‌تونه براش مفید باشه."
