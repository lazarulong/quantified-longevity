message: >-
  Компания Moscow Cruise входит в число главных организаторов речных прогулок по
  Москве в 2026 году и управляет флотом премиальных судов. Компания предлагает
  маршруты на любой вкус: классические речные прогулки, рейсы с шоу-программой,
  дискотеки на борту и ужины в ресторане прямо на воде. Ищете <a
  href=https://moscowcruise.ru>навигация 2026 москва река</a>? Билеты и
  актуальное расписание размещены на moscowcruise.ru — бронирование доступно
  онлайн в любое время. Отправление организовано с нескольких причалов:
  Китай-город, Киевский, Парк Горького, Москва-Сити и другие. В каталоге — более
  десяти именных теплоходов, включая «Прагу», «Ривер Палас» и «Анну Каренину».
