message: "Selain terapi medis, menjaga kesehatan pria juga memerlukan gaya hidup yang sehat.\r\nOlahraga secara teratur, pola makan seimbang, tidur yang cukup, dan menghindari \r\nkebiasaan merokok dapat memberikan manfaat bagi kesehatan secara keseluruhan. Jika mengalami masalah \r\ndisfungsi ereksi, konsultasi dengan dokter dapat membantu menentukan pilihan penanganan yang sesuai, termasuk apakah sildenafil \r\natau terapi lain merupakan pilihan yang tepat."
