message: >-
  Промышленные предприятия, молочные фермы и коммунальные объекты по всей России
  сталкиваются с одной общей проблемой — некачественная вода разрушает
  оборудование и увеличивает себестоимость производства. Компания PWS предлагает
  решение: индивидуальные системы водоочистки, спроектированные под конкретный
  источник воды и профиль предприятия. Все установки соответствуют российским
  СанПиН, а подробности на <a
  href=https://pws.world/promyshlennye-ustanovki>https://pws.world/promyshlennye-ustanovki</a>
  подтверждают: локализованное производство обеспечивает быструю замену деталей
  и минимальный простой. Оборотное водоснабжение сокращает издержки и
  экологические платежи уже с первого года эксплуатации.
