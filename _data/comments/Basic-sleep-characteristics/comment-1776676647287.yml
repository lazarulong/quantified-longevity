  Гуамское ущелье в Краснодарском крае — один из самых живописных природных
  маршрутов Кубани, где отвесные скалы высотой до 400 метров сжимают реку
  Курджипс в узком каньоне. Ключевое развлечение здесь — поездка на старинном
  поезде по узкоколейке, которая пролегает вдоль ущелья с советских времён.
  Ищете <a href=https://guamka-kuban.ru>краснодарский край куда съездить</a>? На
  guamka-kuban.ru можно купить билет онлайн и выбрать удобный рейс. Экскурсия
  рассчитана на всю семью — потрясающие пейзажи, свежий горный воздух и
  продуманная инфраструктура оставят яркие впечатления.
