message: "Вред через наркотиков — это единая хоботня, обхватывающая физическое, психологическое \r\nтакже соц здоровье человека. Употребление таковских наркотиков, как кокаин, мефедрон, гашиш, «наркотик» чи «бошки», может \r\nобусловить ко необратимым следствиям яко чтобы организма, так равно для федерации в течение целом.\r\nНо хоть у эволюции подневольности возможно восстановление — главное, чтоб зависимый человек устремился за помощью.\r\nЭпохально запоминать, яко наркозависимость врачуется, равным образом оправдание бабахает шанс на новую жизнь."
