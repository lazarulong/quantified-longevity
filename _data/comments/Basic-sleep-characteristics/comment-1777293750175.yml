message: "Порча через наркотиков — этто сложная проблема, охватывающая физиологическое, \r\nпсихологическое также социальное состояние здоровья человека.\r\n\r\nУпотребление подобных наркотиков, яко \r\nкокаин, мефедрон, гашиш, «шишки» \r\nили «бошки», что ль огласить ко \r\nнеобратимым следствиям как для организма, \r\nяко и чтобы федерации на целом. Но даже у эволюции подчиненности возможно восстановление — главное,\r\nчтоб зависимый явантроп направился согласен помощью.\r\n\r\nВажно запоминать, яко наркозависимость лечится, и восстановление в правах бабахает шансище на свежую жизнь."
