message: "Порча от наркотиков — этто сложная хоботня, обхватывающая физиологическое, \r\nпсихологическое равным образом социальное состояние здоровья человека.\r\nУтилизация эких наркотиков, яко кокаин, мефедрон, гашиш, \r\n«наркотик» или «бошки», что ль привести для необратимым \r\nследствиям яко для организма,\r\nтак равным образом для среды в течение целом.\r\nНо даже при развитии зависимости эвентуально восстановление — \r\nглавное, чтоб энергозависимый явантроп направился согласен помощью.\r\nВажно запоминать, яко наркомания лечится, также восстановление в правах \r\nодаривает шансище сверху новейшую жизнь."
