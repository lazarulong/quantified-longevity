message: >-
  Егор Косарев — профессиональный видеооператор и монтажёр из Москвы, работающий
  по всей России. Специалист берётся за рекламное, событийное, детское и
  художественное видео, создаёт корпоративные и обучающие фильмы, имиджевые
  проекты, Reels и интервью. Ищете <a href=https://egorkosarev.ru/>видеооператор
  для бизнеса</a>? На egorkosarev.ru представлено портфолио с более чем 110
  реализованными работами. Егор предлагает полный цикл продакшна — от идеи до
  подписания акта — как самостоятельно, экономя бюджет клиента, так и силами
  большой команды для сложных многоуровневых проектов.
