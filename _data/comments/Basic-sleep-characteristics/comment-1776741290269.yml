message: >-
  Выпускной — один из тех редких дней, которые хочется сохранить в каждой
  детали: взгляды, смех, слёзы радости и первые шаги во взрослую жизнь. Именно
  поэтому так важно доверить съёмку профессионалам, которые умеют не просто
  фотографировать, а рассказывать истории. Студия <a
  href=https://profvideo.ru/vypusknoj/>https://profvideo.ru/vypusknoj/</a>
  предлагает комплексную фото и видеосъёмку выпускного в Москве и области под
  ключ: последний звонок, торжественная часть, банкет, монтаж клипа и фильма о
  классе. Команда берёт на себя всё — от тайминга до сдачи готового материала в
  строго оговорённые сроки по договору. Никаких сюрпризов, только результат.
