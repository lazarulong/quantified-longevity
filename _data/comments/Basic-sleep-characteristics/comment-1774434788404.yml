message: "Вред от наркотиков — этто сложная \r\nхоботня, обхватывающая физиологическое, психологическое равным образом общественное состояние здоровья человека.\r\nУтилизация таких наркотиков, яко снежок, мефедрон, ямба, \r\n«наркотик» чи «бошки», что ль обусловить к неконвертируемым следствиям яко чтобы \r\nорганизма, так (а) также для среды в \r\nцелом. Но даже при развитии подчиненности возможно \r\nэлектровосстановление — ядро, чтобы зависимый человек \r\nнаправился согласен помощью.\r\nВажно запоминать, яко наркомания врачуется, а также реабилитация бацнет \r\nшанс на свежую жизнь."
