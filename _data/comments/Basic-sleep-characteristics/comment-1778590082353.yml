message: >-
  Domamir — бренд качественной сантехники с минималистичным дизайном и широким
  выбором покрытий для современного интерьера. В линейке бренда —
  полотенцесушители, смесители и аксессуары для ванной комнаты с упором на
  современные тенденции. На <a
  href=https://domamir-group.ru/>https://domamir-group.ru/</a> размещён удобный
  каталог с возможностью сравнения моделей по серии и покрытию. Продукция
  подходит для самых разных интерьеров и бюджетов — от строгого минимализма до
  более эффектных архитектурных решений.
