message: >-
  Ресурс Vkursi.org следует чёткому редакционному девизу — тримаємо вас завжди в
  курсі важливих подій — и публикует материалы о политике, экономике, бизнесе,
  обществе, здоровье, технологиях и криминале в режиме реального времени.
  Журналисты выпускают эксклюзивные материалы о коррупционных механизмах и
  громких судебных делах опираясь на документальную базу и проверенные
  источники. Держите руку на пульсе событий на <a
  href=https://vkursi.org/>https://vkursi.org/</a> — украинский новостной портал
  для читателей которым важна скорость и точность подачи информации. Блоки
  культуры и технологий органично расширяют острую редакционную линию и делают
  портал универсальным источником информации на каждый день.
