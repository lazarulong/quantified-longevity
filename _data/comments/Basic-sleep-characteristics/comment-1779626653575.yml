message: "Ущерб через наркотиков — это \r\nгрупповая хоботня, обхватывающая физическое, психологическое и общественное здоровье человека.\r\nУтилизация таковских наркотиков, как снежок,\r\nмефедрон, гашиш, «шишки» или «бошки», может родить к неконвертируемым последствиям яко для организма, яко равным образом \r\nчтобы федерации в целом. Но даже при вырабатывании зависимости эвентуально электровосстановление — ядро, чтоб зависимый человек обернулся согласен помощью.\r\nВажно памятовать, яко наркомания врачуется, и восстановление \r\nв правах дает шансище на новую жизнь."
