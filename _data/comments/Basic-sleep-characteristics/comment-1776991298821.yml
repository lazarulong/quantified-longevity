message: >-
  Московская клиника «Онис» занимается лечением варикоза и сосудистых
  заболеваний с помощью передовых малоинвазивных технологий. Врачи используют
  лазерную коагуляцию, склеротерапию и радиочастотную абляцию — без разрезов и
  длительного восстановления. Подробнее об услугах и специалистах — <a
  href=https://www.onisclinic.ru/>https://www.onisclinic.ru/</a> — платформа с
  полной информацией о методах лечения и записи на приём. Каждый пациент
  получает индивидуальный план терапии после диагностики, а результат лечения
  сохраняется надолго благодаря точному подходу и опыту команды.
