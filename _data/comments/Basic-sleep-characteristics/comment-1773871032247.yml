  Как продлить срок службы деревянной детской площадки? Обновляйте пропитку
  каждые 2-3 года.  Подтягивайте крепёж перед каждым сезоном и заменяйте
  изношенные элементы вовремя.  При таком уходе площадка прослужит 15-20 лет.
