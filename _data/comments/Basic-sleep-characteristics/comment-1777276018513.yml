message: >-
  Портал «Інквізиція» действует под лозунгом Deus vult — выпускает журналистские
  расследования, криминальные материалы и жёсткую аналитику невзирая на статус
  фигурантов. Авторы планомерно исследуют схемы коррупции, многолетние судебные
  истории и социальные нарывы — подкрепляя каждый материал документальными
  свидетельствами. Изучайте независимые расследования на <a
  href=https://inquisition.info/>https://inquisition.info/</a> — украинский
  портал для тех кто требует от журналистики реальных результатов. Тематика
  политики, бизнеса, экономики и здоровья раскрыта без полутонов — журналисты не
  избегают прямых оценок и конкретных выводов что ставит ресурс вне ряда
  типичных новостных сайтов.
