message: >-
  <a href=https://xn--d1acjihhe7a2a.xn--p1ai/>ремонт духового шкафа</a>  Центр
  обслуживания климатической техники в Энгельсе и Саратове предлагает ремонт,
  заправку и чистку кондиционеров (сплит-систем). Наши специалисты осуществляют:
  - Очистку и дезинфекцию внутренних блоков - Заправку хладагентом (R22, R410A,
  R32) - Устранение утечек, ремонт компрессоров - Замену плат управления -
  Комплексное сервисное обслуживание. Работаем с продукцией LG, Samsung, Ballu,
  Mitsubishi, Daikin и других производителей. Диагностика проводится перед
  началом ремонтных работ для точного определения проблемы. После согласования
  стоимости и сроков, мастер приступит к выполнению. По окончании ремонта
  техника проверяется на работоспособность. Мы работаем с понедельника по
  субботу с 09:00 до 19:00. Вы можете вызвать мастера на дом или привезти
  оборудование в нашу мастерскую.
