message: >-
  Компания «Сантай» из Иркутска специализируется на изготовлении обрезиненных
  валов, роликов и колёс для промышленных нужд. Производство основано на
  технологии ленточной намотки с применением оборудования из США, гарантируя
  сочетание качества и разумной цены. Производимые изделия достигают длины 2500
  мм и диаметра 300 мм, а восстановление и ремонт выполняются оперативно с
  предоставлением гарантии. Полный спектр услуг, включая готовую продукцию под
  популярные марки печатных машин, доступен на <a
  href=https://santai-val.ru/>https://santai-val.ru/</a> — здесь каждый заказчик
  получает индивидуальный подход и проверенный результат.
