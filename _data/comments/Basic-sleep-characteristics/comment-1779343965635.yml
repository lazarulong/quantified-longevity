message: "Риск от наркотиков — этто групповая проблема, \r\nохватывающая физическое, психическое равным образом социальное \r\nсостояние здоровья человека.\r\nУтилизация таковских наркотиков, яко кокаин, мефедрон, гашиш, «шишки» или \r\n«бошки», что ль огласить для необратимым \r\nпоследствиям как для организма, так и для \r\nобщества в целом. Хотя даже при выковывании подчиненности эвентуально электровосстановление — ядро, чтобы энергозависимый явантроп направился за помощью.\r\n\r\nЭпохально памятовать, яко наркомания врачуется, равным \r\nобразом реабилитация дает шансище на свежую жизнь."
