message: >-
  RASCET — профессиональный инструмент для градуировки резервуаров
  геометрическим методом: введите параметры ёмкости и получите точную
  градуировочную таблицу для любого из 26 типов ёмкостей с погрешностью до
  0,000001%. На <a href=https://rascet.ru/>https://rascet.ru/</a> доступна
  демо-версия 4.1 с сохранением таблиц в Excel. Расчёты выполняются числами
  двойной точности с шагом 1 мм — это превосходит точность любых аналогов. ПО
  внесено в государственный реестр программ и с 2006 года эксплуатируется на
  сотнях предприятий нефтепереработки, химии, АЗС и ЖКХ в России и СНГ.
