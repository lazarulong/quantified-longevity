  Лаборатория «Сила Света» специализируется на светотехнических измерениях и
  формировании официально значимых протоколов по всем нормативным требованиям.
  На <a href=http://silasveta-lab.ru/>http://silasveta-lab.ru/</a> доступна
  проверка подлинности любого протокола по уникальному коду или QR-коду — это
  исключает подделки и гарантирует достоверность данных. Деятельность
  лаборатории полностью соответствует нормативным требованиям и подтверждена
  актуальными свидетельствами о поверке средств измерений.
