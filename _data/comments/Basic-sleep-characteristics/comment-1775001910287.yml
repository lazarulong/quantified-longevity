message: "Порча через наркотиков — это комплексная \r\nпроблема, охватывающая физическое, психологическое и социальное здоровье человека.\r\nУтилизация таких наркотиков, яко снежок, мефедрон, ямба,\r\n«наркотик» чи «бошки», что ль родить для \r\nнеобратимым последствиям яко \r\nчтобы организма, яко равно чтобы федерации \r\nв целом. Хотя хоть при развитии подчиненности эвентуально восстановление — главное, чтоб зависимый человек \r\nобернулся за помощью. Важно запоминать, что наркозависимость врачуется,\r\nтакже реабилитация бацнет шансище на свежую жизнь."
