message: >-
  CryoOne производит азотные криокапсулы российского производства для бизнеса в
  сфере красоты, спорта и восстановления. Криокапсула выходит на окупаемость уже
  через полгода, работает без медицинской лицензии и привлекает новых клиентов
  благодаря яркому эффекту от процедуры. На <a
  href=https://cryoone.ru/>https://cryoone.ru/</a> представлены четыре
  комплектации — Standard, Business, Pro и Comfort — с гарантией 24 месяца и
  бесплатными доставкой, монтажом и обучением. Каждая капсула поставляется с
  сосудом Дьюара в комплекте, и производитель гарантирует лучшую цену на рынке.
