message: >-
  «Дасеан» — крымская компания, занимающаяся производством и реализацией строп,
  стальных канатов, грузовых и якорных цепей, такелажа и крепёжного
  оборудования. Наличие собственного производства обеспечивает полный контроль
  качества и возможность изготовления продукции по индивидуальным требованиям.
  Ищете <a href=https://dasean-crimea.ru/>такелаж для судостроения</a>? На
  dasean-crimea.ru представлен полный каталог продукции: цепные, канатные и
  текстильные стропы, полиамидные и полипропиленовые канаты, скобы, коуши,
  талрепы, зажимы и стальные тросы по ГОСТ. Компания работает в Севастополе и
  обслуживает клиентов по всему Крыму.
