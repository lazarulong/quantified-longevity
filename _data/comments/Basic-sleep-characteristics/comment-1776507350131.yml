message: >-
  Русский Север — один из самых самобытных и малоизведанных туристических
  маршрутов России, где деревянные церкви XV века соседствуют с нетронутой
  тайгой, а Белое море хранит тайны Соловецкого архипелага. Туроператор
  «Севертур» специализируется именно на этом направлении: на сайте <a
  href=https://xn--b1afb8babli.xn--p1ai/>https://xn--b1afb8babli.xn--p1ai/</a>
  представлено более 70 туров — от Каргополя и Кенозерского национального парка
  до Вологды и Великого Устюга. Компания работает как с частными туристами, так
  и с агентствами, предлагая автобусные, праздничные и каникулярные программы с
  продуманной логистикой и размещением.
