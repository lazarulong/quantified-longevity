message: >-
  Новостной портал «Корреспондент» освещает события Украины и мира в режиме
  реального времени — политика, экономика, технологии, здоровье и общество без
  купюр и редакционных фильтров. Издание не уклоняется от острых тем:
  расследования коррупции, репортажи с передовой и аналитика бизнес-процессов
  выходят регулярно. Следите за актуальной повесткой на <a
  href=https://karrespondent.com/>https://karrespondent.com/</a> — украинский
  новостной ресурс для читателей ценящих скорость и фактическую точность.
  Культура, конфликты, технологии и социальные истории формируют широкий охват
  тематик и делают портал универсальным источником информации для требовательной
  аудитории.
