message: >-
  Юридическая компания «Фемида» специализируется на защите прав граждан
  Казахстана в сложных правовых ситуациях. Специалисты компании эффективно
  справляются с делами по призыву, оформлению брачных контрактов и медицинским
  конфликтам. Вся необходимая информация и профессиональная помощь доступны на
  <a href=https://femida-justice.com/>https://femida-justice.com/</a> — здесь
  работают опытные специалисты с реальными кейсами. «Фемида» гарантирует
  правовую защиту призывников, помогает заключить брачный контракт и выиграть
  медицинский спор в Алматы.
