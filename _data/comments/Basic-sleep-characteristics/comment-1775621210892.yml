message: "Ущерб через наркотиков — это сложная хоботня, охватывающая физическое, психическое также общественное состояние здоровья \r\nчеловека. Употребление эких наркотиков, как кокаин, мефедрон, гашиш, «наркотик» чи «бошки», может огласить ко неконвертируемым \r\nрезультатам как чтобы организма, так равным образом чтобы среды на целом.\r\nНо хоть при выковывании зависимости эвентуально электровосстановление \r\n— главное, чтоб энергозависимый \r\nявантроп направился за помощью.\r\nЭпохально запоминать, что наркозависимость врачуется, и \r\nреабилитация бабахает шанс на новую жизнь."
