message: >-
  Магазин автозапчастей Park Motors — надёжный поставщик деталей для владельцев
  коммерческого транспорта марки ГАЗ. Здесь можно найти двигатели ЗМЗ-405, 406,
  409 и УМЗ-4216, блоки цилиндров, головки блока цилиндров Танаки и Эвотек, КПП,
  ГУР, а также шины WestLake SL309 и диски Gold Wheel — всё для Газели Некст,
  УАЗ и Валдай. На сайте <a href=https://tent3302.ru/>https://tent3302.ru/</a>
  представлен широкий каталог запчастей с удобной навигацией по категориям.
  Магазин расположен в Москве на ул. Угрешская, д. 17, работает вторник–суббота
  с 10:00 до 16:00.
