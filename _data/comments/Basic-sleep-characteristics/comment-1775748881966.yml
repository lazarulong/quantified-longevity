message: >-
  Иркутский ресторан «Пекинская Утка» — заведение, в котором подлинные традиции
  китайской кухни соединяются с профессиональным обслуживанием. Кухня охватывает
  весь спектр китайской гастрономии: морепродукты, утиное филе, говядина с
  древесными грибами, свинина и овощные блюда с фирменными соусами. <a
  href=https://pekin-utka.ru/>https://pekin-utka.ru/</a> предлагает
  онлайн-бронирование столика и удобную доставку. Классические и оригинальные
  блюда в меню дополняются привлекательной ценовой политикой, рассчитанной на
  разных гостей.
