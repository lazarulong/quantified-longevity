message: >-
  Современный бизнес не прощает некачественной полиграфии: визитка, листовка или
  брошюра — это лицо компании, и здесь важна каждая деталь. Московская
  типография Самрай предлагает полный спектр полиграфических услуг: от печати
  визиток, буклетов и календарей до широкоформатных баннеров, картин на холсте и
  табличек на металле. На сайте <a
  href=https://samray.ru/>https://samray.ru/</a> можно ознакомиться с прайсом,
  загрузить макет и получить оперативный расчёт заказа. Специалисты работают
  ежедневно, принимают оплату любым удобным способом и гарантируют высокое
  качество даже при срочном тираже.
