message: >-
  Компания «Фемида» — это профессиональная юридическая помощь гражданам
  Казахстана в самых непростых правовых делах. Специалисты компании эффективно
  справляются с делами по призыву, оформлению брачных контрактов и медицинским
  конфликтам. Вся необходимая информация и профессиональная помощь доступны на
  <a href=https://femida-justice.com/>https://femida-justice.com/</a> — здесь
  работают опытные специалисты с реальными кейсами. Компания защищает
  призывников на законных основаниях, помогает составить брачный контракт и
  отстоять права пациентов в Алматы.
