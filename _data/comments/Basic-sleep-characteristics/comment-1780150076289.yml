message: "Вред от наркотиков — этто групповая проблема, обхватывающая \r\nфизиологическое, психическое равным образом соц состояние здоровья человека.\r\nУтилизация таковских наркотиков, яко снежок, мефедрон, ямба, «наркотик» чи «бошки», может родить буква необратимым последствиям как для организма, так равно \r\nдля общества на целом. Хотя хоть у развитии связи эвентуально восстановление — главное, чтоб зависимый человек обернулся за помощью.\r\nВажно запоминать, что наркозависимость врачуется, \r\nи реабилитация бабахает шансище на новую жизнь."
