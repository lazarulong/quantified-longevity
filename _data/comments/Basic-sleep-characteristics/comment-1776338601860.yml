message: "Порча от наркотиков — этто сложная хоботня, охватывающая физиологическое, психологическое (а) также соц здоровье человека.\r\nУтилизация таковских наркотиков,\r\nяко кокаин, мефедрон, гашиш, \r\n«наркотик» чи «бошки», что ль огласить ко неконвертируемым \r\nпоследствиям яко для организма, яко и для федерации в течение целом.\r\n\r\nХотя хоть при вырабатывании подневольности возможно электровосстановление — главное, \r\nчтоб зависимый человек устремился за помощью.\r\nВажно помнить, яко наркомания лечится, равным образом восстановление в правах дает шансище на новейшую \r\nжизнь."
