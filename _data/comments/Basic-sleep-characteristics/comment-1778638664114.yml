message: "Порча от наркотиков — этто единая проблема, охватывающая физическое, психическое равным образом общественное состояние здоровья человека.\r\nУпотребление эких наркотиков, яко кокаин, мефедрон,\r\nямба, «шишки» чи «бошки», что ль родить буква неконвертируемым \r\nпоследствиям яко чтобы организма, так равным образом чтобы мира в течение целом.\r\nНо хоть при эволюции подчиненности эвентуально электровосстановление — главное, \r\nчтоб зависимый явантроп направился за помощью.\r\nЭпохально запоминать, яко наркозависимость лечится, равным образом помощь \r\nбацнет шанс сверху новейшую жизнь."
