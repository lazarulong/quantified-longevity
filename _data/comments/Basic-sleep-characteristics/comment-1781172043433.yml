message: "проктолог в Москве – ведущий \r\nспециалист. Прием в ЦАО.\r\nНазначаем анализы за 20 минут. Акция первый приём 50%.\r\n\r\nлечение геморроя без операции – щадящий \r\nметод для офисных работников.\r\nСклеротерапия. Без больничного.\r\nКомплекс на все узлы.\r\nколоноскопия под наркозом – максимальный комфорт в \r\nМоскве. Медикаментозный сон.\r\nРезультат на руки через час. Промывка кишечника в клинике.\r\n\r\nудаление полипов в кишечнике – без \r\nразрезов и швов. Гистология обязательна.\r\nПолип до 3 см – без госпитализации.\r\nВыписка через 2 часа.\r\nлечение анальной трещины – без \r\nоперации на ранних стадиях.\r\n\r\nПластика дна трещины. Заживление за 7 дней.\r\nПрограмма после родов.\r\nлазерное удаление геморроидальных узлов – без крови \r\nи отёков. Комбинированная лазерная \r\nтехника. Без реабилитации.\r\nВедение проктолога до полного заживления.\r\n\r\nмалоинвазивная проктология – высокие технологии \r\nв Москве. Инфракрасная фотокоагуляция.\r\nКрипты и кондиломы. Экономия бюджета до 60%.\r\n\r\n\r\nсвищ прямой кишки лечение – малоинвазивное иссечение с сохранением сфинктера.\r\nИсключаем недержание. Опыт при рецидивных свищах.\r\n\r\nВходит наркоз и палата.\r\nректоцеле операция – трансанальная \r\nрезекция. Возвращаем качество жизни.\r\nЛапароскопия. Гарантия 3 года.\r\n\r\nгастроскопия и колоноскопия за один \r\nдень – обследуйте весь тракт за один визит.\r\n\r\nПотом колоноскопия (20 минут).\r\nЦена от 15000 ₽ за обе. Консультация гастроэнтеролога в подарок."
