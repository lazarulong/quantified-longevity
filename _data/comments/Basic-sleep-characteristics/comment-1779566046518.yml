message: >-
  Металлические детали с фирменной символикой — это не просто декор, а мощный
  инструмент брендинга. Компания Инпекмет специализируется на литье значков и
  бирок из сплава ЦАМ (Zamak) — прочного, коррозиестойкого и экологически
  безопасного материала. На сайте <a
  href=https://inpekmet.ru/>https://inpekmet.ru/</a> можно рассчитать тираж и
  оформить заказ от одного экземпляра. Изделия отличаются высокой детализацией,
  а финишная обработка включает полировку, покраску, чернение и лакирование.
  Производство работает быстро и гибко — от одного дня.
