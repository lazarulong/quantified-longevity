message: "جمع‌بندی\r\n\r\nبرای کسانی که میخوان\r\n\r\nبازی انفجار\r\n\r\nسرگرم میشن\r\n\r\nاین آدرس اینترنتی\r\n\r\nمی‌تونه گزینه جذابی باشه\r\n\r\nانتخاب مناسبی باشه\r\n\r\nاز طرف دیگه\r\n\r\nبرندهایی مثل\r\n\r\nوبسایت enfejaronline\r\n\r\nو\r\n\r\nѕibbet معتبر\r\n\r\nنقش مهمی دارن\r\n\r\nدر کل داستان\r\n\r\nرضایت داشتم\r\n\r\nو\r\n\r\nقطعا دوباره\r\n\r\nبازدیدش می‌کنم"
