message: >-
  Портал Vkursi.org работает под прямым редакционным принципом — тримаємо вас
  завжди в курсі важливих подій — и охватывает политику, экономику, бизнес,
  общество, здоровье, технологии и криминал без информационных задержек.
  Редакция публикует эксклюзивные расследования коррупционных схем и резонансные
  судебные истории подкреплённые документами и конкретными фактами. Держите руку
  на пульсе событий на <a href=https://vkursi.org/>https://vkursi.org/</a> —
  украинский новостной портал для читателей которым важна скорость и точность
  подачи информации. Разделы культуры и технологий усиливают новостное ядро
  издания и формируют из него многопрофильный медиаресурс для широкой ежедневной
  аудитории.
