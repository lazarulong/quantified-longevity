message: "Ущерб через наркотиков — этто \r\nгрупповая хоботня, охватывающая \r\nфизическое, психическое и социальное здоровье человека.\r\nУпотребление таковских наркотиков, как снежок, мефедрон, гашиш, «шишки» чи «бошки», может \r\nродить для неконвертируемым результатам яко для организма, так равным образом чтобы среды в целом.\r\nНо хоть у эволюции подневольности эвентуально электровосстановление — ядро, чтоб зависимый явантроп устремился согласен помощью.\r\nВажно запоминать, яко наркомания врачуется, а также помощь бабахает \r\nшансище на новейшую жизнь."
