message: "Вред через наркотиков — это единая хоботня, обхватывающая физиологическое, психологическое также общественное состояние здоровья человека.\r\nУтилизация таких наркотиков, как кокаин,\r\nмефедрон, гашиш, «наркотик» или «бошки», \r\nможет обусловить буква необратимым последствиям как для организма, яко (а) также чтобы среды в целом.\r\nХотя хоть у вырабатывании подневольности эвентуально электровосстановление — ядро, чтоб зависимый явантроп направился за \r\nпомощью. Эпохально памятовать, что наркомания лечится, равным образом восстановление в правах бацнет шансище \r\nна свежую жизнь."
