message: >-
  Фотография — это не просто нажатие кнопки, это язык, которому можно и нужно
  учиться. Именно для тех, кто делает первые шаги с камерой в руках, создан
  онлайн-журнал для фотолюбителей. Здесь публикуются практичные материалы на
  любой вкус: от азов астрофотографии и техники стек-фокуса до увлекательного
  фризлайта — рисования светом. Заглянув на <a
  href=https://photojournal.online/>https://photojournal.online/</a>, читатель
  найдёт советы признанных мастеров, в том числе предметного фотографа Олега
  Семёнова, а рубрики «Азбука фотографа» и «Спроси у мастера» превращают сложную
  теорию в понятные инструкции. Новые статьи выходят регулярно, так что каждое
  посещение сайта приносит свежие знания и вдохновение для новых творческих
  экспериментов.
