message: >-
  «Симпсоны» — культовый американский мультсериал с 1989 года, давно ставший
  символом мировой поп-культуры. На протяжении 37 сезонов вышло свыше 800
  эпизодов едкой социальной сатиры о спрингфилдской семье — нерадивый отец,
  стойкая мать и трое детей раз за разом оказываются в историях, бьющих по
  политике, шоу-бизнесу и человеческим слабостям. Ищете <a
  href=https://simpsony-smotret.net/>сериал симпсоны</a>? Все эпизоды доступны
  на simpsony-smotret.net в высоком качестве с профессиональными озвучками
  HDrezka, 2x2 и BaibaKo. Сериал не стареет: каждая серия — точное и беспощадное
  зеркало реальной жизни.
