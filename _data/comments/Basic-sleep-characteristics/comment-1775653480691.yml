message: "Здравствуйте! \r\nСоциофобия лечение которой позволяет преодолеть страх общественных ситуаций и осуждения, проводится у нас. Центр психологической помощи в Москве MyPsyHealth использует экспозиционную терапию для постепенного привыкания к социуму. Пациенты учатся выступать публично, знакомиться и отстаивать свои границы. Групповая терапия предоставляет безопасную среду для отработки социальных навыков. Преодолейте изоляцию и начните свободно общаться с людьми благодаря нашей поддержке. \r\nПолная информация по ссылке - https://mypsyhealth.ru/services/Consultation-with-a-pediatric-neurologist/ \r\nалкоголизм у пожилых терапия, фобии лечение, профориентация психолог \r\nнизкая самооценка работа, терапевтический лекарственный мониторинг, игромания лечение в Москве \r\nВсего наилучшего, и успехов в лечении и здоровье!"
