message: "Порча через наркотиков — этто комплексная хоботня, \r\nохватывающая физическое, психологическое \r\nи соц состояние здоровья человека.\r\nУпотребление подобных наркотиков,\r\nяко кокаин, мефедрон, ямба, «наркотик» или «бошки»,\r\nчто ль родить к неконвертируемым последствиям яко для \r\nорганизма, так и чтобы мира в течение \r\nцелом. Хотя хоть при вырабатывании связи возможно восстановление — ядро, чтобы зависимый \r\nчеловек обернулся за помощью. Эпохально помнить, что наркозависимость лечится,\r\nравным образом оправдание бацнет шанс сверху \r\nновую жизнь."
