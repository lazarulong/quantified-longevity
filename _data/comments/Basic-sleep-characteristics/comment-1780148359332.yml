message: "Риск через наркотиков — это групповая хоботня, обхватывающая физическое, психическое и социальное \r\nздоровье человека. Утилизация эких наркотиков, яко кокаин, мефедрон, ямба, \r\n«шишки» чи «бошки», что ль обусловить к необратимым результатам яко для организма, так равно чтобы мира в течение \r\nцелом. Но даже у выковывании подчиненности эвентуально восстановление — главное, чтоб зависимый человек \r\nобратился за помощью. Важно памятовать, что наркозависимость \r\nлечится, и помощь бабахает шансище на новую \r\nжизнь."
