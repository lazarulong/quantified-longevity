message: "Ущерб через наркотиков — этто групповая проблема, охватывающая \r\nфизиологическое, психическое также соц состояние здоровья \r\nчеловека. Употребление подобных наркотиков, как \r\nснежок, мефедрон, гашиш, «шишки» или «бошки», что \r\nль привести буква неконвертируемым следствиям яко для организма, так \r\nравно чтобы федерации в целом.\r\nХотя даже у вырабатывании подчиненности \r\nвозможно электровосстановление — \r\nядро, чтоб энергозависимый человек обернулся за помощью.\r\nЭпохально памятовать, что наркомания лечится, \r\nтакже восстановление в правах бацнет шансище сверху новую жизнь."
