message: >-
  «Український оглядач» последовательно реализует редакционный принцип —
  оглядаємо, аналізуємо, висловлюємо думку — и охватывает Украину, мир,
  политику, экономику, криминал и бизнес с экспертной подачей без размытых
  формулировок. Журналисты ведут расследования коррупционных схем и публикуют
  острые аналитические материалы опираясь на верифицированные источники и
  конкретную документальную базу. Читайте независимую аналитику на <a
  href=https://obozrevatel.org/>https://obozrevatel.org/</a> — украинский
  медиаресурс для аудитории ценящей глубину анализа и честную журналистскую
  позицию. Разделы технологий, культуры и здоровья органично расширяют
  редакционный охват и превращают портал в универсальный медиаисточник для
  разноплановой аудитории.
