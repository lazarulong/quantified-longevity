  «РазВикТрейд» — производитель из Беларуси, ориентированный на изготовление
  пресс-форм и пластиковых изделий для клиентов двух стран. Предприятие
  сопровождает проект на каждом этапе — от чертежей и оснастки до серийного
  литья и доставки. Ищете <a href=https://press-forma.by/katalog>тара
