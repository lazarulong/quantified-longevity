  проекта. Производственные мощности на 1000 кв.м. с 24 единицами техники
  позволяют стабильно отгружать более 1,5 млн изделий каждый месяц.
  Сотрудничество с компанией позволяет сократить затраты и увеличить
  маржинальность бизнеса в разы.
