message: "Здравствуйте! \r\nГомель дворец румянцевых расположен в живописном парке на берегу реки Сож приятно. Белоснежное здание с колоннами отражается в воде создавая красивую картину. Парк с редкими деревьями и животными подходит для семейного отдыха с детьми. Исторические экспозиции внутри рассказывают о владельцах усадьбы и их эпохе. \r\nПолная информация по ссылке - https://aldita.net/ \r\nВелодром катание на велосипедах, Дилижан маленькая швейцария, Акаба дайвинг красное море \r\nокеания острова, Пермь деревянное зодчество, Эфес античный город \r\nВсего наилучшего и хорошей информации!"
