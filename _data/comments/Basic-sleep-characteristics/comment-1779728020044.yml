message: >-
  Группа компаний САФОРА — надежный производитель лакокрасочных материалов,
  предлагающий профессиональные решения для ремонта и творчества. В ассортименте
  представлены колеровочные пасты, акриловые эмали с различными эффектами,
  краски для любых поверхностей, лаки для дерева и стен, а также защитные
  составы от плесени и гидроизоляция. На сайте <a
  href=https://safora18.ru/>https://safora18.ru/</a> можно подобрать
  качественные материалы для отделки радиаторов, печей и каминов, найти
  специализированные художественные краски и лаки для декупажа. Компания также
  предлагает грунтовки, клеи, монтажную пену и другие строительные материалы
  собственного производства, что гарантирует стабильное качество продукции и
  доступные цены для профессионалов и частных заказчиков.
