message: "بخوام خودمونی بگم، اولش فکر نمی‌کردم \r\nچیز خاصی ببینم ولی چند بخشش برام قابل توجه بود.\r\nدرود، معمولاً فقط وقتی چیزی برام جالب باشه نظر می‌دم.\r\nاخیراً وقتی با چند نفر درباره این موضوع صحبت می‌کردیم اینجا برام جالب شد.\r\nهمون ابتدا ظاهر سادهاما قابل \r\nاستفاده‌ای داشت. از نظر من \r\nهر کسی باید قبل از ورود، شرایط و جزئیات رو کامل بخونه.\r\nیکی از بچه‌هاقبلاً درباره بازی انفجار زیاد سوال می‌پرسید.\r\nبه همین خاطر چند بخش رو با حوصله‌تر خوندم.\r\n\r\nچیزی که باعث شد چند دقیقه بیشتر بمونم این بود \r\nکه برای کسی که تازه با این فضا آشنا می‌شه قابل فهم \r\nبود. با این حال بهتره کاربر قبل از هر اقدامی \r\nخودش هم تحقیق کنه. برای اون دسته از کاربرها که می‌خوانقبل از تصمیم‌گیری دید بهتری داشته \r\nباشن، بد نیست این صفحه رو هم ببینن.\r\n\r\nگاهی هم سایت‌هایی مثل enfｅjaronline همراه با sibbet \r\nآنلاین نشون میدن این حوزه چقدر گسترده \r\nشده. یکی از بچه‌ها که اسمش امیر بود،می‌گفت مشکل خیلی \r\nاز سایت‌ها اینه که فقط شعار می‌دن ولی توضیح درست نمی‌دن؛ برای همین من هم بیشتر به متن‌ها دقت کردم.\r\n\r\nدر یک نگاه کلی ارزش وقت گذاشتن داشت.\r\nاگر کسی قصد بررسی داره بهتره با دید باز \r\nو منطقی جلو بره. جمع‌بندی من اینه \r\nکه تجربه بدی نبود و حداقل برای آشنایی اولیه ارزش وقت گذاشتن داشت، مخصوصاً اگر کسی بخواد قبل از \r\nتصمیم‌گیری دید بهتری پیدا کنه."
