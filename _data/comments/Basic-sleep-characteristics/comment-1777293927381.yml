message: >-
  Шеринговая экономика в России перешагнула отметку 1 трлн рублей и не
  замедляется. Тулбокс нашёл точную точку входа — аренда инструмента через
  боксы-постаматы без сотрудников, залога и бумажной волокиты. Пользователь
  арендует шуруповёрт или пароочиститель через мобильное приложение прямо в
  боксе у ближайшего магазина. Подробности партнёрства — на <a
  href=https://biz.tlbx.ru/>https://biz.tlbx.ru/</a> — инвестиции от 3 млн
  рублей с окупаемостью 18–24 месяца. Сеть уже работает в Челябинске, Уфе и
  Екатеринбурге и приглашает партнёров в новые города.
