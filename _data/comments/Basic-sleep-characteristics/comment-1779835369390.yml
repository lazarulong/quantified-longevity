message: "Вред от наркотиков — это комплексная проблема, охватывающая физическое, психологическое также соц здоровье \r\nчеловека. Употребление таких наркотиков, яко снежок, мефедрон, ямба, «шишки» или \r\n«бошки», что ль обусловить ко необратимым результатам \r\nяко для организма, так (а) также для федерации в целом.\r\nНо хоть при развитии подневольности возможно электровосстановление — \r\nядро, чтоб энергозависимый человек обернулся за помощью.\r\nЭпохально запоминать, яко наркозависимость врачуется, а \r\nтакже восстановление в правах одаривает шанс сверху новую жизнь."
