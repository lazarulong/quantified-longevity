  «Врата Штейна» — аниме-сериал 2011 года, где самопровозглашённый «сумасшедший
  учёный» Ринтаро Окабе вместе с друзьями случайно создаёт микроволновку,
  отправляющую сообщения в прошлое. Каждое отправленное сообщение тревожит ткань
  времени, порождая волны последствий, которые крушат привычный мир без
  возврата. Ищете <a href=https://vrata-shteyna-kinogo.cc/>врата штейна все
  серии</a>? На vrata-shteyna-kinogo.cc все 25 серий доступны бесплатно с
  несколькими вариантами озвучки. Сериал мастерски соединяет фантастику и
  психологическую драму: под слоем иронии прячется жёсткий вопрос о цене каждого
  решения — кем пожертвовать и реально ли починить время, оставшись собой.
