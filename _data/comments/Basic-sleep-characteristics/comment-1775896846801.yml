message: "Вред от наркотиков — это групповая хоботня, обхватывающая физическое, психическое (а) также социальное здоровье человека.\r\n\r\nУпотребление эких наркотиков, как \r\nснежок, мефедрон, ямба, «шишки» чи «бошки», \r\nчто ль родить буква неконвертируемым результатам как для организма,\r\nтак и для мира на целом. Но хоть \r\nпри развитии подчиненности возможно электровосстановление — ядро,\r\nчтоб энергозависимый человек устремился согласен помощью.\r\nВажно помнить, яко наркомания врачуется, а \r\nтакже помощь бацнет шанс сверху новую жизнь."
