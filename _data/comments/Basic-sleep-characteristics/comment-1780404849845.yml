message: >-
  Runico.ru — это увлекательный онлайн-ресурс, посвящённый рунам Старшего
  Футарка, древнейшего рунического алфавита I–VIII веков нашей эры. Сайт
  предлагает детальное описание всех 24 символов, каждый из которых несёт
  глубокий мифологический и магический смысл. Согласно скандинавским преданиям,
  сами руны были открыты богу Одину ценой девяти дней самопожертвования на
  Мировом Древе Иггдрасиль. На <a href=https://runico.ru/>https://runico.ru/</a>
  эти знания изложены доступно и увлекательно: читатель узнает историю каждого
  символа, его значение и связь с древней мудростью предков. Ресурс станет
  отличным проводником для всех, кто интересуется нордической культурой и
  рунической традицией.
