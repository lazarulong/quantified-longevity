message: >-
  Туроператор «Мой Токио» специализируется на турах в Японию из России и
  предлагает групповые, индивидуальные и корпоративные поездки на любой вкус. В
  каталоге — экскурсионные маршруты по Токио, Киото, Осаке, Хиросиме и другим
  городам, горнолыжные туры, пляжный отдых на Окинаве и даже обучение в Японии.
  Ищете <a href=https://dvmt.ru/>путевки в японию спб</a>? На dvmt.ru собраны
  актуальные путёвки и горячие туры с профессиональным сопровождением.
  Официальный статус компании подтверждён реестровым номером РТО 004645, что
  обеспечивает полную защиту туриста на всех этапах поездки.
