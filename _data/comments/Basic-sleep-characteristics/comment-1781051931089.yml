message: "Риск через наркотиков — этто сложная проблема, обхватывающая физиологическое, психическое (а) \r\nтакже социальное здоровье \r\nчеловека. Употребление таковских \r\nнаркотиков, как кокаин, мефедрон, ямба, «шишки» чи «бошки»,\r\nчто ль привести к неконвертируемым следствиям яко \r\nдля организма, так равным образом для общества в \r\nтечение целом. Хотя даже у вырабатывании \r\nсвязи эвентуально восстановление — главное, чтобы зависимый человек обратился \r\nсогласен помощью. Эпохально помнить, яко наркомания врачуется, а также помощь дает шансище на новейшую жизнь."
