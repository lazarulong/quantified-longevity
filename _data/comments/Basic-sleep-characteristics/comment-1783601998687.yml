message: "¡Qué locura total, chamigos! Me llamo Gustavo desde San Lorenzo.\r\n\r\nComo buen timbero y paraguayo de pura cepa, llevo días \r\nsin dormir bien, llorando de la alegría. \r\nCuando arrancamos este Mundial 2026, toqué fondo anímicamente al \r\nperder 4-1 contra Estados Unidos, una vergüenza terrible.\r\nPero como manda nuestra historia, resurgimos de las cenizas: le metimos una garra \r\ntremenda para ganarle 1-0 a Turquía y después aguantamos a muerte para sacar ese 0-0 contra Australia.\r\n\r\n¡El partido contra Alemania me quitó diez años de vida y me devolvió \r\nla fe! El mundo entero de los pronósticos \r\nnos daba por muertos, pero mostramos unos huevos gigantes para \r\nmantener el 1-1 frente a esa máquina. ¡Esa tanda de \r\npenales, ganando 4-3, me hizo llorar tirado en el piso como una criatura!\r\n\r\n¡Con lo que gané en esa apuesta a la sorpresa me pago \r\nlas deudas de todo el año y festejo un mes seguido!\r\n\r\n\r\nAhora se nos viene Francia este 4 de julio y apuesto el auto,\r\nla casa y la vida a mi querida Albirroja. ¡No me importa si la \r\nlógica dice que nos golean, yo muero con la mía y apuesto todo \r\na una nueva hazaña! \r\n¡Vamos Paraguay, carajo!"
