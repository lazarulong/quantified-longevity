message: >-
  Мото ДВ — официальный интернет-магазин на OZON, специализирующийся на продаже
  мототехники и сопутствующих товаров для активного отдыха. В ассортименте
  представлены квадроциклы ведущих брендов, включая модели Hummer 250, Loncin
  400 EFI EPS 4x4 и Grizzly 250, а также скутеры серии Armour Pro и Apakani
  Aerox мощностью 125 куб. см. На странице <a
  href=https://www.ozon.ru/seller/moto-dv/>https://www.ozon.ru/seller/moto-dv/</a>
  покупатели найдут технику для различных возрастных категорий — от детских до
  взрослых моделей с широким диапазоном мощности двигателя и максимальной
  скорости. Магазин регулярно проводит акции со скидками до 14%, обеспечивает
  быструю доставку и гарантирует подлинность реализуемой продукции, что
  подтверждается положительными отзывами клиентов.
