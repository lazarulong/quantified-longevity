message: >-
  «Самрай» — московская типография, выполняющая полиграфию любой сложности: от
  визиток и листовок до буклетов, брошюр, книг, плакатов, баннеров, чертежей и
  фотографий. Компания предлагает широкоформатную печать, производство наклеек,
  календарей, бейджей, пластиковых карт и табличек, а также нанесение на
  футболки и кружки. Ищете <a
  href=https://samray.ru/tverdyj-pereplet-diplomnyh-rabot/>где купить корочки
  для диплома</a>? На samray.ru представлен полный прайс и технические
  требования к макетам. Послепечатная обработка включает ламинацию, биговку,
  тиснение, вырубку и твёрдый переплёт — всё в одном месте без лишних
  посредников.
