message: >-
  MoscowWaterWays — удобный сервис для организации речных прогулок по Москве с
  отправлением от главных городских причалов. Маршруты охватывают отправление от
  Китай-города, Воробьёвых гор, Парка Горького, Москвы-Сити и прочих популярных
  локаций столицы. Ищете <a href=https://moscowwaterways.ru/15people>расписание
  теплоходов причал москва-сити</a>? На платформе moscowwaterways.ru можно
  выбрать маршрут и оплатить билеты онлайн — они придут на электронную почту.
  Среди доступных рейсов — праздничные маршруты на 9 Мая, День города, выпускной
  сезон и встречу Нового года. Все причалы находятся в шаговой доступности от
  станций метро и МЦК, что делает посадку быстрой и комфортной.
