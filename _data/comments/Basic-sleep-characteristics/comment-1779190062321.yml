message: >-
  Информационное агентство «Акценты» публикует материалы о политике, экономике,
  обществе, бизнесе, технологиях, здоровье и криминале без редакционных фильтров
  и излишней мягкости в подаче фактов. Авторы издания раскрывают скрытые схемы,
  осмысляют общественные изменения и освещают резонансные события с опорой на
  конкретные доказательства и чёткую журналистскую позицию. Следите за самыми
  острыми материалами на <a href=https://akcenty.net/>https://akcenty.net/</a> —
  информационное агентство для читателей которые не довольствуются поверхностной
  подачей новостей. Острые расследования и профессиональная аналитика превращают
  агентство в многопрофильный медиаинструмент для широкого круга читателей
  стремящихся к полноценному пониманию общественных процессов.
