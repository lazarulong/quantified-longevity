message: "Sildenafil adalah bahan aktif yang terdapat dalam Viagra dan bekerja dengan meningkatkan aliran darah \r\nke area tertentu saat terjadi rangsangan seksual. Obat ini bukan untuk semua orang sehingga pemeriksaan kesehatan terlebih dahulu sangat disarankan. Mengikuti petunjuk penggunaan dapat membantu meminimalkan risiko efek samping."
