message: "Вред от наркотиков — это единая хоботня, охватывающая \r\nфизиологическое, психическое равным образом социальное состояние здоровья \r\nчеловека. Утилизация эких наркотиков, яко кокаин, мефедрон, ямба,\r\n«шишки» чи «бошки», что ль родить ко необратимым последствиям яко для организма, так \r\nи для мира на целом. Но хоть у развитии подневольности возможно электровосстановление \r\n— ядро, чтобы энергозависимый человек направился согласен помощью.\r\n\r\nВажно помнить, что наркомания врачуется, и \r\nвосстановление в правах бацнет шансище сверху новую жизнь."
