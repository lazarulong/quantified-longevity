message: "Здравствуйте! \r\nМарсель старый порт является сердцем этого средиземноморского города. Рыбный рынок утром предлагает свежайшие морепродукты для покупки. Крепость Иф видна с набережной и манит поклонников Дюма. Прогулка на катере к бухтам Calanques обязательна летом. \r\nПолная информация по ссылке - https://aldita.net/ \r\nБаку старый город ичери шехер, Лосьон после загара кожа, Родос рыцарский замок \r\nБотанический сад экзотические растения, Гуанчжоу кантонская башня, Джинсы универсальная одежда \r\nВсего наилучшего и хорошей информации!"
