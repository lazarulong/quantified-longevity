message: >-
  Типография «Самрай» в Москве берётся за полиграфию любой сложности: визитки,
  листовки, буклеты, брошюры, книги, плакаты, баннеры, чертежи и фотографии —
  под одной крышей. Типография оснащена цифровой и широкоформатной печатью и
  выпускает наклейки, календари, бейджи, пластиковые карты, таблички, выполняет
  печать на футболках и кружках. На <a
  href=https://samray.ru/>https://samray.ru/</a> представлен полный перечень
  услуг и технические требования к макетам. Компания самостоятельно проводит все
  этапы послепечатной обработки: ламинацию, тиснение, биговку, вырубку и твёрдый
  переплёт — без привлечения субподрядчиков.
