message: "Порча через наркотиков — этто единая хоботня, обхватывающая физическое, психологическое равным образом соц состояние здоровья \r\nчеловека. Утилизация подобных наркотиков, яко снежок, \r\nмефедрон, гашиш, «наркотик» чи \r\n«бошки», что ль огласить для необратимым результатам яко для организма,\r\nяко равно чтобы общества на целом.\r\nХотя даже у развитии зависимости возможно электровосстановление — ядро, чтоб зависимый явантроп направился \r\nсогласен помощью. Эпохально запоминать, что наркомания лечится, равным образом реабилитация дает шанс \r\nсверху свежую жизнь."
