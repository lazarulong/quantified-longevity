message: >-
  Парвеник — интернет-магазин банных веников и трав с доставкой по Москве и
  Подмосковью, где отборное качество сочетается с ценами ниже рыночных. На сайте
  <a href=https://www.parvenik.ru/>https://www.parvenik.ru/</a> представлен
  широкий ассортимент товаров для настоящей русской бани: берёзовые, дубовые,
  эвкалиптовые веники и целебные травяные сборы — всё оптом и в розницу.
  Действует акция «5+1 в подарок», фактически дающая скидку 20%, а удобное
  получение через пункты выдачи Яндекс Маркета делает покупку максимально
  простой.
