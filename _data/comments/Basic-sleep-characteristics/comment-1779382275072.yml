message: >-
  «Делай Промо» — SaaS-платформа для брендов и агентств, позволяющая запускать
  чековые акции, программы лояльности и мотивацию продавцов без привлечения
  разработчиков. Платформа объединяет конструктор лендингов, OCR-распознавание
  чеков, мультиканальные чат-боты для Telegram и VK, защищённые кодовые механики
  и сквозную аналитику с выгрузкой в Excel в одном интерфейсе. На <a
  href=http://makerpromo.ru/>http://makerpromo.ru/</a> уже зарегистрировано
  свыше 24 000 чеков и 18 000 активных пользователей. Проект находится на стадии
  закрытого бета-теста и предлагает участникам специальные условия подключения.
