message: >-
  Москва-река открывает город совершенно с иного ракурса — величественного,
  тихого и невероятно красивого. Компания Moscow Cruise за более чем пять лет
  работы организовала речные прогулки для свыше 10 000 довольных пассажиров, и
  каждый рейс подтверждает репутацию надёжного сервиса. Заходите на <a
  href=https://moscowcruise.ru/>https://moscowcruise.ru/</a> и выбирайте
  подходящий маршрут: удобное бронирование, круглосуточная поддержка и
  индивидуальный подход гарантированы. Профессиональная команда сопровождает
  клиента на каждом этапе — от выбора прогулки до момента, когда теплоход мягко
  отчаливает от причала навстречу огням столицы.
