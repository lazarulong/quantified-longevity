message: "Риск от наркотиков — этто единая проблема, \r\nохватывающая физическое, психическое и социальное здоровье человека.\r\nУтилизация подобных наркотиков, как снежок,\r\nмефедрон, ямба, «наркотик» чи «бошки», что ль огласить к необратимым последствиям яко чтобы организма, яко равно чтобы федерации в целом.\r\nХотя хоть при развитии подневольности возможно восстановление — \r\nглавное, чтоб энергозависимый человек направился за помощью.\r\nЭпохально помнить, что наркозависимость врачуется, также восстановление в правах бацнет шансище сверху новую жизнь."
