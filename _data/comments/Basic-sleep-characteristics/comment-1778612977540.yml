message: >-
  Беларусь живёт насыщенной жизнью, и следить за её пульсом помогает надёжный
  новостной агрегатор, где информация всегда актуальна и доступна. Портал <a
  href=https://news.com.by/>https://news.com.by/</a> аккумулирует свежие новости
  из открытых источников, охватывая события страны, региона и мира в удобном
  формате. Здесь можно быстро узнать главное без лишнего шума: лаконичная
  подача, интуитивная навигация и регулярные обновления делают сайт незаменимым
  инструментом для тех, кто ценит своё время. Читайте новости в картинках,
  следите за календарём событий и оставайтесь в курсе всего важного вместе с
  командой редакции.
