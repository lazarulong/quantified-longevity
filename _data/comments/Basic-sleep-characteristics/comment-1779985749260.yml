message: >-
  Современные путешественники ценят комфорт и надёжность, а именно это
  предлагает сервис трансферов, заслуживший доверие тысяч клиентов. Бронирование
  поездки на <a href=https://transfer-easy.ru/>https://transfer-easy.ru/</a>
  занимает считанные минуты: фиксированная цена от 500 рублей, бесплатное
  ожидание при задержке рейса и встреча с именной табличкой — всё включено.
  Автопарк компании состоит исключительно из иномарок не старше пяти лет: от
  комфортных Toyota Corolla до представительских Mercedes S-класса. Водители
  помогут с багажом, а в салоне действует строгий запрет на курение. Путешествие
  начинается приятно!
