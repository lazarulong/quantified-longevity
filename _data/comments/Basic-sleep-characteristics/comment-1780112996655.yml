message: >-
  Дубай — город, где роскошь доступна круглосуточно, и именно здесь работает
  City Drinks Dubai — сервис премиум-доставки алкоголя, который давно завоевал
  доверие жителей и гостей эмирата. Независимо от того, планируете ли вы
  вечеринку с друзьями, романтический ужин или деловой приём, на сайте <a
  href=https://drinks-dubai.shop/>https://drinks-dubai.shop/</a> вы найдёте
  богатый выбор напитков: изысканные вина и шампанское, крафтовое пиво, виски,
  водку, джин, текилу и готовые коктейли. Сервис работает 24 часа в сутки, 7
  дней в неделю, гарантируя оперативную и надёжную доставку по всему Дубаю —
  заказ можно оформить онлайн, по телефону или через мессенджер.
