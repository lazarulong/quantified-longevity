message: >-
  Шеринговая экономика в России перешагнула отметку 1 трлн рублей и не
  замедляется. Тулбокс занял в нём чёткую нишу — прокат инструмента и бытовой
  техники через постаматы без персонала, залога и договоров. Пользователь
  арендует шуруповёрт или пароочиститель через мобильное приложение прямо в
  боксе у ближайшего магазина. Подробности партнёрства — на <a
  href=https://biz.tlbx.ru/>https://biz.tlbx.ru/</a> — инвестиции от 3 млн
  рублей с окупаемостью 18–24 месяца. Тулбокс присутствует в Челябинске, Уфе и
  Екатеринбурге и активно ищет партнёров для выхода в новые регионы.
