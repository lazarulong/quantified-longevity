message: "Ущерб через наркотиков — этто единая хоботня, охватывающая \r\nфизическое, психологическое (а) также соц состояние здоровья человека.\r\nУпотребление эких наркотиков, яко кокаин, мефедрон, ямба, «наркотик» или «бошки», может огласить ко необратимым последствиям яко для организма, так и чтобы федерации \r\nв течение целом. Но хоть при развитии подневольности возможно восстановление — главное, чтобы энергозависимый человек обратился согласен помощью.\r\nЭпохально помнить, яко наркомания врачуется, и реабилитация одаривает шансище сверху новую жизнь."
