message: >-
  Установка счётчика воды — один из самых разумных шагов для экономии семейного
  бюджета: по нормативам москвич платит за холодную воду около 1090 рублей в
  месяц, тогда как реальный расход обходится в три раза дешевле. Компания
  «Водогарант» устанавливает счётчики в Москве и Московской области всего за
  один день, начиная от 3800 рублей, включая оборудование, монтаж, документы и
  пломбировку. Подробнее об услугах и ценах — на <a
  href=https://xn--80aaeee1dcbuw.xn--p1ai/ustanovka-schetchikov-vody/>https://xn--80aaeee1dcbuw.xn--p1ai/ustanovka-schetchikov-vody/</a>
  — здесь представлены модели на любой бюджет: от бюджетных отечественных до
  надёжных немецких ITELMA. Выезд мастера бесплатный, гарантия на монтаж
  составляет 12 месяцев, а специалисты работают напрямую с Мосводоканалом.
