message: >-
  Московский интернет-магазин «Семена на Яблочкова» располагает тысячами позиций
  семян овощей, цветов и зелени от лучших российских и зарубежных брендов.
  Каталог включает томаты, огурцы, капусту, редкие культуры и обширную коллекцию
  цветов всех категорий. Заказать всё необходимое для сада и огорода можно на <a
  href=https://magazinsemena.ru/>https://magazinsemena.ru/</a> — доставка по
  всей России. Здесь собраны семена Агросемтомс, Евросемена, Семена Алтая и
  других надёжных брендов с гарантией качества.
