message: >-
  Если вы ищете надёжный источник Telegram-аккаунтов для работы, обратите
  внимание на специализированный магазин <a
  href=https://marketgram.io/>https://marketgram.io/</a> — здесь представлены
  аккаунты разных стран в форматах TData и Session+JSON с отлёжкой, что
  существенно снижает риски блокировок. Выдача происходит мгновенно после
  оплаты, невалидные аккаунты заменяются без лишних вопросов, а поддержка
  доступна прямо в Telegram. Регулярные акции и несколько вариантов оплаты
  делают сервис удобным для тех, кто работает с аккаунтами системно и ценит
  стабильность результата.
