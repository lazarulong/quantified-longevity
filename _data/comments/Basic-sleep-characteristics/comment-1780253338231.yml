message: "Un detalle importante es la volatilidad de cada tragamoneda.\r\nLos juegos suaves dan premios pequeños y constantes, óptimas para sesiones largas.\r\nLos juegos arriesgados pueden estar fríos \r\npor largo rato pero después disparar premios muy grandes."
