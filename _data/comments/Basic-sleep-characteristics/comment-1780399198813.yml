message: >-
  Looking to embed a cryptocurrency exchange into your website? Visit <a
  href=https://swapsdk.io/>https://swapsdk.io/</a> and SwapSDK will help you. It
  allows companies to embed a cryptocurrency exchange into a website, wallet,
  app, or service where exchange functionality needs to work within the
  product's interface. This approach is suitable for products that require a
  crypto exchange API for rates, exchange pairs, orders, status tracking, and
  built-in exchange flow logic.
