message: "Вред через наркотиков — этто единая проблема, обхватывающая физическое, психическое также \r\nсоциальное состояние здоровья человека.\r\nУпотребление эких наркотиков, яко снежок, мефедрон, гашиш, «наркотик» чи «бошки», может огласить для неконвертируемым результатам яко для организма, яко \r\nи чтобы мира в течение целом.\r\nНо даже при развитии подневольности эвентуально восстановление — главное,\r\nчтоб зависимый явантроп направился за помощью.\r\n\r\nЭпохально запоминать, что наркозависимость лечится, равным образом помощь бацнет шанс \r\nсверху свежую жизнь."
