message: >-
  Компания Waltz Prof — российский производитель стальных профилей и
  комплектующих для строительства: здесь выпускают фасадно-перегородочные
  системы из оцинкованной и нержавеющей стали, профили серий ВП150, ВП165, ВП250
  и ВП372 с терморазрывом, оцинкованные трубы, штапики и Т-образные профили для
  ворот. На сайте <a href=https://waltzprof.com/>https://waltzprof.com/</a>
  представлен широкий ассортимент самоклеящихся уплотнителей, автоматических
  порогов Smart LDM и скрытых дверных петель — всё необходимое для
  профессионального монтажа. Прямые поставки от производителя гарантируют
  конкурентные цены и стабильное качество продукции.
