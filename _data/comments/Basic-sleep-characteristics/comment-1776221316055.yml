message: >-
  «Наследники» — южнокорейский сериал 2013 года о системе, в которой не мечты, а
  капитал и родословная определяют, кем ты станешь. За блеском дорогих мундиров
  и семейных гербов в элитной школе скрывается холодный мир выгоды и скрытого
  соперничества. Между наследником империи и бедной гордой девушкой вспыхивает
  чувство, которое бросает вызов деньгам, традициям и семейным амбициям. Ищете
  <a href=https://nasledniki-smotret.net/>сериал наследники</a>? Все 20 серий в
  профессиональной озвучке доступны на nasledniki-smotret.net без регистрации и
  рекламы. Социальное неравенство, борьба за корпоративную власть и выбор между
  долгом и чувствами — 20 эпизодов держат у экрана до финальных титров.
