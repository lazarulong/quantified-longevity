message: "Ищете надежный сервис для \r\nресторана или магазина? Мы специализируемся \r\nна торговом холодильном оборудовании.\r\nЗвоните, выезжаем по Москве и области.\r\n\r\nТехническое обслуживание климатического оборудования.\r\nЗаправка фреоном. Снизим риск аварии на 90%.\r\n\r\nВ наличии запчасти на складе. Ремонт: витрин, бонет, горок, кондиционеров.\r\nДоговор, закрывающие документы."
