message: "I think that what you published made a ton of sense.\r\n\r\nHowever, what about this? suppose you were to write a killer headline?\r\nI am not suggesting your information is not good., \r\nhowever suppose you added something that grabbed \r\nfolk's attention? I mean Basic Sleep Characteristics - Quantified Longevity is a little vanilla.\r\nYou should glance at Yahoo's home page and note how \r\nthey write news titles to get people interested. You might add a related video \r\nor a related picture or two to get people interested about everything've written. \r\nIn my opinion, it would make your posts a little livelier."
