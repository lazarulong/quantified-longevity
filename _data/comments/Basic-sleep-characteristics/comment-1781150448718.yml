message: "من خیلی خلاصه بگم، این سایت برای بررسی اولیه بد نبود \r\nو چند نکته مثبت داشت. درود به همه، معمولاً فقط وقتی چیزی برام جالب باشه \r\nنظر می‌دم. هفته قبل وقتی داشتم تجربه بقیه کاربرا رو می‌خوندم به این سایت رسیدم.\r\nهمون ابتدا ظاهر ساده اما قابل استفاده‌ای داشت.\r\nبهنظرم بهتره آدم چند منبع مختلف رو \r\nهم ببینه. یکی از دوستام به \r\nاسم مهدی قبلاً درباره بازی انفجار \r\nزیاد سوال می‌پرسید. همین موضوع باعث شد فقط سطحی رد نشم.\r\nیکی از بخش‌هایی که بد نبود \r\nکه توضیحاتش خیلی پیچیده \r\nنوشته نشده بود. با این حال نباید فقط با یک کامنت \r\nنتیجه‌گیری کرد. برای کسانی که می‌خوان درباره بازی انفجار بیشتر بدونن، برای گرفتن دید کلی می‌تونه \r\nکمک‌کننده باشه. از طرف دیگه دامنه‌هاییمثل еnfejaronline همراه با پلتفرم sibbet باعث شدن کاربرا بیشتر دنبال مقایسه باشن.\r\nیکی از آشناهای من بیشتر دنبال پیش‌بینی ورزشی بود و همیشه می‌گفت \r\nاگر سایتی توضیحات ساده و روشن نداشته باشه، بهتره آدم بااحتیاط \r\nبیشتری جلو بره. اگر بخوام خلاصه بگم به نظرم \r\nمی‌شه به عنوان یک گزینه قابل بررسی بهش نگاه \r\nکرد. از نظر من کسی که وارد این فضا می‌شه باید \r\nصرفاً بر اساس تبلیغ تصمیم نگیره.\r\nجمع‌بندی من اینه که تجربه بدی \r\nنبود و حداقل برای آشنایی اولیه \r\nارزش وقت گذاشتن داشت، مخصوصاً اگر کسی \r\nبخواد قبل از تصمیم‌گیری دید بهتری پیدا کنه."
