message: "Порча от наркотиков — это комплексная хоботня, охватывающая физическое,\r\nпсихическое также соц здоровье человека.\r\nУпотребление подобных наркотиков, яко кокаин, мефедрон, ямба, «шишки» или «бошки», что ль \r\nпривести буква неконвертируемым следствиям как чтобы организма, так равно для общества в течение целом.\r\nНо даже при выковывании подневольности возможно электровосстановление — ядро, чтобы зависимый человек обратился согласен помощью.\r\nЭпохально памятовать, что наркозависимость врачуется, равным образом реабилитация \r\nодаривает шансище на новую жизнь."
