message: >-
  Зоомагазин «Живой уголок» даёт возможность купить экзотического примата —
  умного и эмоционального питомца с неповторимым характером. Ищете, где <a
  href=https://zhivoiugolok.ru/product-category/obezyany/>купить обезьянку</a>? 
  На zhivoiugolok.ru/product-category/obezyany представлены карликовая игрунка,
  саймири, тамарины, лемур катта, галаго, магот и другие виды — каждый со своим
  характером. Все приматы содержатся в здоровых условиях и проходят социализацию
  под контролем опытных специалистов. Эти приматы чутко реагируют на голос и
  интонацию владельца, глубоко привязываются к нему и остаются верными питомцами
  на многие годы.
