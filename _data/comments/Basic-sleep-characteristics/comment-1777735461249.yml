message: >-
  Компания «ВторСтекло» <a
  href=https://www.vtorsteklo.ru/>https://www.vtorsteklo.ru/</a>
  специализируется на приеме, вывозе и утилизации стеклянных отходов от
  населения и бизнеса. Организация работает на рынке более 20 лет, предлагая
  выгодные условия сотрудничества и оперативное обслуживание. Компания принимает
  различные виды стеклобоя: оконное стекло, стеклопакеты, бутылки и банки любых
  цветов и объемов. Собственный автопарк и спецтехника позволяют быстро
  организовать вывоз стекла с объектов клиентов, а также установить контейнеры
  для сбора отходов. Все собранное сырье направляется на перерабатывающие
  предприятия, где используется повторно в промышленности.
