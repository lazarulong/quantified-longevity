message: >-
  Ресурс «В Украине» публикует материалы об обществе, бизнесе, технологиях,
  здоровье и образовании без информационного шума и лишних оговорок. Редакция
  охватывает широкий тематический спектр — от стратегической релокации бизнеса
  до медицинской аналитики — и подаёт информацию чётко и по существу. Следите за
  актуальными событиями на <a href=https://108.in.ua/>https://108.in.ua/</a> —
  общественно-аналитический ресурс для читателей которые ценят конкретику и
  глубину подачи материала. Профессиональные статьи и аналитические обзоры
  делают ресурс незаменимым ежедневным источником информации для разноплановой
  украинской читательской аудитории.
