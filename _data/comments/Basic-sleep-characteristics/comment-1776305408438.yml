message: >-
  Московский системный интегратор ASA Production работает по уникальной
  философии «Анализ — Решение — Сопровождение», которая за десятилетие
  превратила компанию в надёжного партнёра для бизнеса любого масштаба. На <a
  href=http://asa.ru/>http://asa.ru/</a> представлен широкий каталог серверов,
  систем хранения данных, сетевого оборудования, источников бесперебойного
  питания и программного обеспечения от ведущих мировых брендов — Cisco, HP,
  ASUS, Microsoft, Eaton — по ценам интернет-магазина при квалификации
  системного интегратора. Компания регулярно проводит акции и распродажи,
  обеспечивает гарантию, возврат и проектные скидки, выстраивая с каждым
  заказчиком долгосрочные и стабильные отношения.
