message: >-
  Современный автосервис невозможно представить без надёжного профессионального
  оборудования — и здесь важно не ошибиться с выбором поставщика. Компания
  Nordberg предлагает исчерпывающий каталог техники для любого участка:
  шиномонтажного, слесарного, кузовного, малярного и диагностического. На сайте
  <a
  href=https://nordberg43.ru/catalog/oborudovanie_1/>https://nordberg43.ru/catalog/oborudovanie_1/</a>
  собрано всё — от подъёмников и стендов сход-развала до сварочного и
  окрасочного оборудования, компрессоров, зарядных устройств и специнструмента.
  Здесь же представлены расходные материалы, масла, химия для мойки и
  детейлинга, а также оригинальные запчасти.
