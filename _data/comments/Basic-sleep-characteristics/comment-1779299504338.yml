message: >-
  Общественно-аналитический портал «В Украине» публикует материалы об обществе,
  бизнесе, технологиях, здоровье и образовании без редакционных фильтров и
  лишних отступлений от фактов. Авторы портала охватывают разнообразную тематику
  — от деловой аналитики до практических обзоров в сфере здоровья — и подают
  материал конкретно и профессионально. Следите за актуальными событиями на <a
  href=https://108.in.ua/>https://108.in.ua/</a> — общественно-аналитический
  ресурс для читателей которые ценят конкретику и глубину подачи материала.
  Практические статьи и экспертные обзоры превращают портал в полноценный
  ежедневный инструмент для широкой украинской аудитории.
