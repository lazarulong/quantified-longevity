message: >-
  Если вы хотите узнать всё об одной из самых характерных и неукротимых
  охотничьих пород — ягдтерьере, — канал Риддика (Шефа) фон Тира на Дзене станет
  для вас настоящим открытием: здесь собраны честные личные истории,
  практические советы по дрессировке и выгулу, а также рекомендации по здоровью
  питомца; на <a href=https://dzen.ru/riddick>https://dzen.ru/riddick</a> автор
  без прикрас рассказывает, каково это — жить с маленьким, но абсолютно
  бескомпромиссным охотником, который каждый день испытывает хозяина на
  выдержку, и почему именно этим ягдтерьеры так влюбляют в себя навсегда.
