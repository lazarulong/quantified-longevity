message: >-
  Если вы планируете строительство, отделку или обустройство участка и ищете
  качественные пиломатериалы по честным ценам, компания «Лесстройторг» работает
  на этом рынке с 2004 года и прошла проверку временем. На сайте <a
  href=https://lesvmsk.ru/>https://lesvmsk.ru/</a> представлен огромный
  ассортимент: обрезная и строганная доска, брус, вагонка, блок-хаус, террасная
  и фасадная доска — всё производится полным циклом, от заготовки сырья до
  готового изделия. Дополнительно доступны покраска финской краской Tikkurila и
  огнебиозащитная пропитка. База находится в Мытищах на Осташковском шоссе,
  работает шесть дней в неделю. Покупая напрямую у производителя, вы экономите
  без ущерба для качества.
