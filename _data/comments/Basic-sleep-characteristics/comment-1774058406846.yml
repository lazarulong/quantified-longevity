  <a href=https://tonyjack.org/>tonyjack org</a> The Brain, Mind and
  Consciousness laboratory investigates high-level cognitive processes using
  brain imaging (fMRI), behavior and introspective reports. We are particulary
  interested in areas of overlap, as well as separation, between psychological
  processes involved in social cognition, mechanical reasoning, attention and
  self-awareness.
