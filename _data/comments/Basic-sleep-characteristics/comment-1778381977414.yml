message: >-
  Если вы давно мечтали провести незабываемый вечер на воде в самом сердце
  столицы, то речные прогулки по Москве-реке — именно то, что вам нужно. Сайт <a
  href=https://ticketscruise.ru/>https://ticketscruise.ru/</a> собрал лучшие
  рейсы с живой музыкой, DJ-сетами и авторскими шоу-программами, чтобы каждый
  выход в город становился настоящим событием. Удобное онлайн-бронирование за
  пару минут, электронный билет с QR-кодом и скидки до 90% на популярные
  маршруты делают сервис по-настоящему привлекательным. Бар, коктейли и
  продуманный до мелочей сервис на борту завершают картину идеального
  московского вечера.
