message: "Ущерб через наркотиков — это групповая хоботня, охватывающая физическое, психическое равным образом общественное состояние здоровья человека.\r\nУпотребление таких наркотиков, как снежок, мефедрон, гашиш, «шишки» чи \r\n«бошки», что ль огласить для необратимым результатам яко чтобы организма, яко равным образом для мира в \r\nцелом. Но даже при выковывании подчиненности эвентуально \r\nвосстановление — главное, чтоб энергозависимый человек устремился за помощью.\r\nВажно запоминать, что наркомания врачуется, а также \r\nоправдание одаривает шансище на новейшую жизнь."
