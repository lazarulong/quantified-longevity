message: >-
  Белорусская компания «РазВикТрейд» специализируется на изготовлении пресс-форм
  и изделий из пластика уже более 10 лет. Предприятие берёт на себя весь процесс
  — от разработки 3D-модели и производства пресс-формы до серийного литья и
  доставки заказчику. На <a
  href=https://press-forma.by/>https://press-forma.by/</a> доступен бесплатный
  расчёт стоимости проекта. Мощности предприятия — 1000 кв.м. и 24 единицы
  техники — обеспечивают стабильный выпуск до 1,5 млн изделий в месяц. Выгоднее
  китайских аналогов — чистая прибыль клиента вырастает в 2–3 раза.
