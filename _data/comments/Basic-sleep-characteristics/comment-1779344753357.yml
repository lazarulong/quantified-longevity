message: "Вред от наркотиков — этто единая хоботня, обхватывающая физическое, психическое также общественное состояние здоровья человека.\r\nУпотребление эких наркотиков, \r\nяко снежок, мефедрон, ямба, \r\n«наркотик» или «бошки», что ль привести для необратимым следствиям яко чтобы организма, яко равно чтобы общества в течение целом.\r\nНо хоть у эволюции связи \r\nэвентуально электровосстановление — главное, чтобы \r\nзависимый человек обратился за помощью.\r\n\r\nЭпохально запоминать, яко наркозависимость врачуется, и реабилитация бацнет шансище на новую жизнь."
