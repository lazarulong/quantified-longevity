message: >-
  Производитель wall.glass выполняет проектирование и монтаж стеклянных
  перегородок, офисных дверей и противопожарных систем для бизнес-объектов.
  Производитель предлагает полный спектр решений: от цельностеклянных дверей и
  офисных систем до войлочных панелей и декоративного пластика CPL/HPL. Ищете <a
  href=https://wall.glass/>стеклянные двери для офиса</a>? На сайте wall.glass
  доступны BIM-каталог технические чертежи DWG и RAL-инструменты для точного
  подбора решений. Все конструкции сертифицированы, компания имеет отраслевые
  награды и поставляет продукцию с чёткими условиями оплаты и доставки.
