message: >-
  Издание «Український оглядач» придерживается чёткого редакционного кредо —
  оглядаємо, аналізуємо, висловлюємо думку — и публикует материалы об Украине,
  мире, политике, экономике, криминале и бизнесе без уклончивых оценок. Авторы
  издания расследуют коррупционные механизмы и готовят предметную аналитику с
  опорой на верифицированные данные и доказательную фактуру. Читайте независимую
  аналитику на <a href=https://obozrevatel.org/>https://obozrevatel.org/</a> —
  украинский медиаресурс для аудитории ценящей глубину анализа и честную
  журналистскую позицию. Разделы технологий, культуры и здоровья органично
  расширяют редакционный охват и превращают портал в универсальный медиаисточник
  для разноплановой аудитории.
