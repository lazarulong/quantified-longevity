message: >-
  Re308 — профильный магазин для стрелков и профессионалов в области точной
  стрельбы: всё для релоадинга и снайпинга в одном месте. Широкий каталог
  включает прессы, матрицы, капсюляторы, инструменты для подготовки гильз,
  оптику, ложи, ДТК, сошки, бороскопы и химию для чистки оружия. Ищете <a
  href=https://re308.ru/>купить для релоадинга</a>? На re308.ru представлен
  полный ассортимент оборудования ведущих производителей. Магазин предлагает
  услуги по снаряжению патронов и подготовке гильз, а также организует обучение
  — от начального уровня до освоения сложного релоадингового оборудования.
