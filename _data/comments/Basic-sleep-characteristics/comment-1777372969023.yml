  Новостной ресурс «Корреспондент» публикует украинские и мировые события без
  задержек — экономика, политика, здоровье и технологии без сглаживания острых
  углов. Портал последовательно берётся за сложные темы: коррупционные
  расследования, репортажи о событиях и аналитические бизнес-обзоры публикуются
  без перерывов. Следите за актуальной повесткой на <a
  href=https://karrespondent.com/>https://karrespondent.com/</a> — украинский
  новостной ресурс для читателей ценящих скорость и фактическую точность.
  Культура, конфликты, технологии и социальные истории формируют широкий охват
  тематик и делают портал универсальным источником информации для требовательной
  аудитории.
