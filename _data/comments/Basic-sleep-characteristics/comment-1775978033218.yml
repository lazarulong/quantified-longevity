  Двенадцать сезонов и 245 серий — именно столько выдержал американский сериал
  «Кости», что само по себе говорит о его уровне. Для Темперанс Бреннан скелет —
  это зашифрованное дело: она видит в костях то, мимо чего проходит традиционная
  криминалистика. Её постоянный партнёр — агент Бут из ФБР, полная
  противоположность: он доверяет инстинкту там, где она доверяет данным. Ищете
  <a href=https://kosti-smotret.net/>кости все серии</a>? Смотреть все серии
  онлайн бесплатно в хорошем качестве можно на kosti-smotret.net с несколькими
  вариантами озвучки. Конфликт между точным знанием и человеческим инстинктом
  пронизывает весь сериал и не отпускает до финальных титров.
