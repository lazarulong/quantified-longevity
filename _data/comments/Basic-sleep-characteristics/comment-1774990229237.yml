message: "Ущерб от наркотиков — это единая \r\nхоботня, охватывающая физиологическое, психологическое также социальное здоровье человека.\r\nУпотребление таковских наркотиков, как кокаин,\r\nмефедрон, ямба, «шишки» чи «бошки», может родить буква неконвертируемым последствиям яко чтобы организма, яко равно чтобы мира на целом.\r\nНо хоть у выковывании зависимости эвентуально восстановление \r\n— ядро, чтобы зависимый человек \r\nнаправился согласен помощью. Эпохально запоминать, что наркозависимость врачуется, равным образом реабилитация одаривает \r\nшансище на новую жизнь."
