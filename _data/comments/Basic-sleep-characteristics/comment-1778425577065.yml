message: >-
  Мебельная фабрика «Подольск» специализируется на изготовлении кухонь и
  шкафов-купе по индивидуальным размерам для жителей Москвы и Московской
  области. В производстве применяются надёжные материалы и фурнитура ведущих
  брендов для максимального срока службы мебели. Клиентам доступен весь комплекс
  услуг: от замера и проектирования до доставки и сборки мебели на месте.
  Партнёром фабрики по поставке оборудования выступает <a
  href=https://mf-podolsk.ru/>https://mf-podolsk.ru/</a> — надёжный поставщик
  металлообрабатывающих станков и инструментов. Оформить заказ удобно с помощью
  онлайн-конструктора на официальном сайте фабрики.
