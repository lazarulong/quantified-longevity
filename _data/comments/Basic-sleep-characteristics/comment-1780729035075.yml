message: "راستش من این کامنت رو بیشتر از زاویه تجربه شخصی می‌نویسم و نمی‌خوام چیزی رو قطعی معرفی کنم.\r\nسلام دوستان، معمولاً فقط وقتی \r\nچیزی برام جالب باشه نظر می‌دم.\r\nچند شب پیش وقتی داشتم تجربه بقیه کاربرا رو می‌خوندم چند \r\nبخش این سایت رو نگاه کردم. در نگاه اول به نظرم نسبتاً مرتب بود.\r\nچیزی که برای من مهم بود اینه \r\nکه هر کسی باید قبل از ورود، شرایط و جزئیات رو کامل بخونه.\r\n\r\nیکی از بچه‌ها بیشتر از همه روی امنیت و قابل فهم بودن توضیحات حساس بود.\r\nهمین باعث شد من هم دقیق‌تر نگاه کنم.\r\nیکی از بخش‌هایی که بد نبود که حس نمی‌کردم همه چیز فقط با اغراق نوشته \r\nشده. طبیعتاً بهتره کاربر قبل از هر \r\nاقدامی خودش هم تحقیق کنه.\r\nبرای افرادی که قصد دارن قبل از شروع اطلاعات بیشتری داشته \r\nباشن دنبال مقایسه بین سایت‌های مختلف هستن، بهتره در کنار \r\nچند گزینه دیگه بررسی بشه. وقتی این حوزه رو نگاه می‌کنی اسم‌هایی مثل enfejaronline آنلاین همراه با sibbet \r\nآنلاین در بین بعضی کاربران شناخته‌تر شدن.\r\nیکی از رفیقام که قبلاً چند سایت مشابه رو بررسی \r\nکرده بود، همیشه روی این موضوع تأکید داشت که کاربر باید قبل \r\nاز هر کاری چند گزینه رو با هم مقایسه کنه.در مجموع برای شروع آشنایی بد نبود.\r\nبه نظرم بهتره عجله نکنه و چند گزینه \r\nرو مقایسه کنه. اگر بخوام ساده بگم، نه می‌شه با یک نگاه تأییدش کردنه ردش؛ بهتره چند بخشش رو دید، شرایط \r\nرو خوند و بعد نظر داد."
