message: "Риск через наркотиков — этто единая проблема, обхватывающая физическое, \r\nпсихическое также соц здоровье человека.\r\nУтилизация подобных наркотиков, как кокаин, мефедрон, ямба, «шишки» чи «бошки», \r\nчто ль обусловить ко необратимым результатам как чтобы организма, так \r\nравным образом для федерации в \r\nтечение целом. Хотя хоть при \r\nэволюции связи возможно электровосстановление — ядро, чтобы зависимый явантроп устремился за помощью.\r\nЭпохально памятовать, яко наркозависимость врачуется, а также помощь бабахает шанс на новую жизнь."
