message: >-
  Mebelink — профессиональная перетяжка и реставрация мягкой мебели в Москве с
  гарантией 3 года на все работы. Компания использует износостойкие и
  гипоаллергенные материалы, подбирает эксклюзивные ткани под любой интерьер и
  выполняет ремонт диванов, кресел, кроватей, стульев и офисной мебели. <a
  href=https://mebelink.com/>https://mebelink.com/</a> рассчитает стоимость по
  фото за 15 минут — цена фиксируется сразу и не меняется. Доставка и сборка
  входят в стоимость заказа. Рейтинг 5,0 на Яндексе — лучшее свидетельство
  надёжности компании.
