message: >-
  «Ювелирный Альянс» — московская компания, специализирующаяся на покупке и
  продаже золотых и серебряных монет: «Георгий Победоносец», «Червонец сеятель»,
  зарубежные инвестиционные и памятные выпуски. Всего 4% к рыночной котировке —
  минимальная надбавка, которая делает инвестиции по-настоящему выгодными. <a
  href=https://jewelery-alliance.ru/>https://jewelery-alliance.ru/</a>
  предлагает удобный каталог с фильтрацией по металлу и серии, оплату и доставку
  по Москве. Монеты из золота 999 пробы — надёжный и проверенный инструмент
  сохранения капитала вне зависимости от колебаний фондового рынка.
