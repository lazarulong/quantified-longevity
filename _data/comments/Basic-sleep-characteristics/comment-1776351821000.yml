  Постапокалиптический сериал «Одни из нас» по культовой игре The Last of Us —
  одна из самых мощных экранизаций последних лет. Грибковая инфекция уничтожила
  цивилизацию, превратив города в руины и людей — в выживальщиков. Джоэл,
  сломленный потерями, получает задание доставить подростка Элли через всю
  страну — девочку, в чьей крови может быть спасение человечества. Ищете <a
  href=https://odni-iz-nas-kinogo.online/>одни из нас смотреть онлайн</a>?
  Odni-iz-nas-kinogo.online — все 17 серий двух сезонов в профессиональной
  озвучке без регистрации. Это история не о зомби — а о доверии, утрате и том,
  что делает нас людьми.
