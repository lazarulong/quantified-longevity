message: "Вред через наркотиков — этто групповая хоботня, охватывающая физиологическое, психологическое равным образом соц состояние здоровья человека.\r\nУпотребление таких наркотиков, как снежок, мефедрон, ямба, \r\n«шишки» чи «бошки», может обусловить ко необратимым результатам как для организма, так равно \r\nдля мира в течение целом. Хотя хоть при эволюции подневольности возможно восстановление — главное,\r\nчтобы зависимый явантроп обратился за помощью.\r\nВажно памятовать, что наркомания врачуется, \r\nа также восстановление в правах бацнет шансище сверху новую жизнь."
