message: >-
  Криминальный триллер Netflix «Охотник за разумом» рассказывает о том, как
  агенты ФБР Холден Форд и Билл Тенч в конце 1970-х приступили к изучению
  психологии серийных убийц, заложив фундамент поведенческого профайлинга. Ищете
  <a href=https://ohotnik-za-razumom-smotret.net/>охотник за разумом все
  серии</a>? Все 19 серий двух сезонов доступны бесплатно на
  ohotnik-za-razumom-smotret.net с профессиональной озвучкой LostFilm и SDI
  Media. Безупречно воссозданная эпоха, фирменный стиль Финчера и леденящие душу
  беседы с историческими преступниками делают «Охотника за разумом» эталоном
  умного криминального сериала — обязателен к просмотру.
