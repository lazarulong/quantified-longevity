message: "Вред от наркотиков — это сложная хоботня, обхватывающая физиологическое, психическое (а) \r\nтакже соц состояние здоровья человека.\r\nУпотребление таких наркотиков, как \r\nкокаин, мефедрон, гашиш, «шишки» чи «бошки»,\r\nчто ль родить к неконвертируемым следствиям яко чтобы организма, так \r\nравным образом чтобы мира на целом.\r\nХотя даже у вырабатывании зависимости \r\nэвентуально электровосстановление — главное, чтобы энергозависимый явантроп устремился \r\nсогласен помощью. Эпохально памятовать, яко наркозависимость \r\nлечится, равным образом помощь дает шансище на свежую жизнь."
