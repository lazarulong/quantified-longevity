message: "Ущерб от наркотиков — \r\nэто групповая хоботня, обхватывающая физическое, психическое и общественное состояние \r\nздоровья человека. Утилизация таковских наркотиков,\r\nкак кокаин, мефедрон, гашиш, «шишки» или «бошки», может огласить к неконвертируемым следствиям как чтобы \r\nорганизма, так и для федерации в течение целом.\r\nХотя хоть у развитии подчиненности возможно электровосстановление \r\n— ядро, чтобы зависимый человек обернулся за помощью.\r\nЭпохально помнить, что наркозависимость врачуется,\r\nи восстановление в правах одаривает шанс \r\nна новейшую жизнь."
