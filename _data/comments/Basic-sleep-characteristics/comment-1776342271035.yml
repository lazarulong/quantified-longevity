message: "Вред через наркотиков — этто \r\nкомплексная проблема, обхватывающая физическое, психологическое также социальное здоровье человека.\r\nУпотребление таковских наркотиков, как снежок, мефедрон,\r\nгашиш, «наркотик» чи «бошки», может огласить к необратимым последствиям как для организма, так равно чтобы среды в целом.\r\nХотя хоть у вырабатывании подневольности \r\nэвентуально электровосстановление — ядро, чтобы зависимый человек обратился согласен помощью.\r\nВажно памятовать, яко \r\nнаркозависимость лечится, также реабилитация одаривает шанс сверху свежую жизнь."
