message: >-
  «РазВикТрейд» — предприятие из Беларуси с десятилетним опытом производства
  пресс-форм и пластиковых изделий для рынков Беларуси и России. Полный
  производственный цикл включает проектирование, изготовление пресс-формы,
  серийное литьё и доставку готовых изделий клиенту. На <a
  href=https://press-forma.by/>https://press-forma.by/</a> доступен бесплатный
  расчёт стоимости проекта. Производственная площадь 1000 кв.м. и 24 единицы
  оборудования обеспечивают выпуск до 1,5 млн изделий в месяц. По сравнению с
  китайскими поставщиками клиенты получают рост чистой прибыли в 2–3 раза.
