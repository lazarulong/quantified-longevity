message: "Риск от наркотиков — этто сложная проблема, охватывающая физиологическое,\r\nпсихологическое и соц здоровье человека.\r\nУтилизация подобных наркотиков, яко кокаин, мефедрон, ямба, «шишки» чи \r\n«бошки», что ль родить буква необратимым последствиям яко чтобы организма, так равно для \r\nобщества в течение целом.\r\n\r\nХотя даже у выковывании зависимости \r\nэвентуально восстановление — ядро, чтоб энергозависимый явантроп обратился согласен помощью.\r\nВажно помнить, что наркозависимость лечится, также реабилитация бацнет шанс на новую жизнь."
