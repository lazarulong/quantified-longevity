message: >-
  Металлообработка — отрасль, где цена ошибки измеряется браком и простоями.
  Портал <a href=https://metalloobrabotka.org/>https://metalloobrabotka.org/</a>
  объединяет производителей, поставщиков и специалистов отрасли на одной
  профессиональной площадке. Здесь публикуются актуальные новости, технические
  статьи, обзоры оборудования и база предприятий. Ресурс полезен как опытному
  технологу, так и руководителю, который ищет подрядчика по токарным, фрезерным
  или сварочным работам в своём регионе.
