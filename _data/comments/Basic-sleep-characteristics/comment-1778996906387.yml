message: >-
  Издание «Аргумент» работает с чётким редакционным вектором — заради розвитку
  та процвітання України — и публикует материалы о политике, криминале,
  обществе, бизнесе и культуре без уклончивых формулировок. Журналисты фиксируют
  резонансные события оперативно и с конкретикой — от схем силовых структур до
  судебных историй длиной в десятилетие. Следите за актуальной повесткой на <a
  href=https://arhument.com/>https://arhument.com/</a> — украинский новостной
  ресурс для читателя требующего точных фактов и честных оценок. Блоки спорта,
  культуры и технологий органично усиливают редакционную повестку и формируют из
  издания полноценный ежедневный источник для самого широкого круга читателей.
