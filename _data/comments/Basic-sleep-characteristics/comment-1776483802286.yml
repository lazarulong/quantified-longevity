message: >-
  С 1999 года Busstar специализируется на пассажирских перевозках и заслужила
  репутацию проверенного партнёра среди корпоративных заказчиков, туристов и
  частных клиентов. Собственный парк техники включает микроавтобусы от 17 мест и
  автобусы до 47 мест разных классов — от стандарта до VIP. Ищете <a
  href=https://www.busstar.ru/>аренда микроавтобуса москва недорого</a>? На
  busstar.ru можно рассчитать стоимость аренды онлайн и оформить заказ на
  экскурсию, трансфер, свадебное торжество или междугородний рейс.
  Профессиональные водители соблюдают маршрут и обеспечивают безопасность
  пассажиров на каждом маршруте.
