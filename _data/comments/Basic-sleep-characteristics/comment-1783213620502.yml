message: "Viagra merupakan obat yang mengandung sildenafil dan sering digunakan untuk membantu \r\nmengatasi disfungsi ereksi pada pria dewasa.\r\nBanyak orang di Indonesia mencari informasi mengenai cara kerja, manfaat, serta penggunaan yang tepat.\r\nSebelum menggunakan obat ini, penting untuk memahami dosis yang \r\ndianjurkan dan berkonsultasi dengan tenaga medis agar penggunaan tetap aman."
