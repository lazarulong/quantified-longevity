message: >-
  Откройте для себя удивительную Японию вместе с профессиональным туроператором
  «МОЙ ТОКИО», который специализируется исключительно на турах в Страну
  восходящего солнца. Компания предлагает разнообразные программы: от
  классических экскурсионных маршрутов по Токио, Киото и Осаке до тематических
  туров по следам аниме, горнолыжного отдыха в Нагано и пляжного релакса на
  Окинаве. На сайте <a href=https://dvmt.ru/>https://dvmt.ru/</a> вы найдете
  готовые групповые туры и возможность создать индивидуальный маршрут с учетом
  ваших интересов. Туроператор имеет реестровый номер РТО 004645, что
  гарантирует надежность и безопасность вашего путешествия в эту fascinирующую
  страну контрастов.
