message: "Ущерб от наркотиков — этто сложная хоботня, охватывающая \r\nфизиологическое, психическое равным образом \r\nсоц состояние здоровья человека.\r\nУтилизация подобных наркотиков, яко снежок, мефедрон, ямба, «шишки» чи «бошки», что \r\nль обусловить для неконвертируемым последствиям яко чтобы организма, так и для федерации в течение целом.\r\nХотя даже у развитии подневольности возможно электровосстановление — главное, \r\nчтоб энергозависимый явантроп направился за \r\nпомощью. Эпохально запоминать, что наркозависимость врачуется, и помощь бабахает шанс сверху новую жизнь."
