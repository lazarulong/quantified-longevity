message: "Риск от наркотиков — этто комплексная \r\nпроблема, обхватывающая физиологическое, психическое (а) также общественное состояние здоровья человека.\r\nУпотребление таких наркотиков, яко кокаин, мефедрон, ямба, «шишки» или «бошки», что ль родить к необратимым результатам яко чтобы организма, так (а) также чтобы \r\nобщества на целом. Но даже у эволюции подчиненности эвентуально электровосстановление — главное,\r\nчтобы зависимый явантроп обратился за помощью.\r\nЭпохально запоминать, что наркозависимость \r\nврачуется, равным образом реабилитация дает шансище \r\nсверху новейшую жизнь."
