message: "Порча через наркотиков — это групповая проблема, обхватывающая физиологическое, \r\nпсихическое и социальное здоровье человека.\r\n\r\nУтилизация таковских наркотиков, как снежок, мефедрон, гашиш, «шишки» чи «бошки», что ль обусловить для неконвертируемым последствиям яко \r\nдля организма, так (а) также для \r\nсреды в течение целом. Но даже при эволюции связи эвентуально восстановление — ядро, чтобы зависимый явантроп обернулся \r\nза помощью. Важно памятовать, что наркомания врачуется, также восстановление в правах дает \r\nшанс на свежую жизнь."
