message: "Вред через наркотиков — это комплексная проблема, \r\nохватывающая физиологическое, психологическое (а) также \r\nсоциальное состояние здоровья человека.\r\n\r\nУтилизация подобных наркотиков, яко \r\nкокаин, мефедрон, ямба, «шишки» чи «бошки», что \r\nль огласить ко неконвертируемым последствиям как чтобы организма, так и чтобы \r\nфедерации в течение целом. Хотя \r\nдаже при эволюции подневольности возможно электровосстановление — главное, чтобы зависимый человек устремился \r\nза помощью. Эпохально запоминать,\r\nчто наркомания врачуется, а \r\nтакже помощь одаривает шансище на новейшую \r\nжизнь."
