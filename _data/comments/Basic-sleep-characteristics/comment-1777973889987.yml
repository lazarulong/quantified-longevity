message: >-
  ООО «РазВикТрейд» — белорусский производитель пресс-форм и изделий из пластика
  с опытом более 10 лет на рынках Беларуси и России. Предприятие берёт на себя
  весь процесс — от разработки 3D-модели и производства пресс-формы до серийного
  литья и доставки заказчику. На <a
  href=https://press-forma.by/>https://press-forma.by/</a> доступен бесплатный
  расчёт стоимости проекта. Площадка в 1000 кв.м. с 24 единицами оборудования
  позволяет производить до 1,5 млн пластиковых изделий ежемесячно. Производство
  обходится дешевле китайского: чистая прибыль заказчика увеличивается в 2–3
  раза.
