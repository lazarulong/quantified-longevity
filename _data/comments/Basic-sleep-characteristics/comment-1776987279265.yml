message: >-
  Настоящая русская баня немыслима без хорошего веника — и именно здесь кроется
  секрет истинного удовольствия от парной. Магазин «Парвеник» предлагает широкий
  выбор банных веников: дубовые, берёзовые, эвкалиптовые и хвойные — каждый вид
  обладает своими целебными свойствами и особым ароматом. На сайте <a
  href=https://www.parvenik.ru/>https://www.parvenik.ru/</a> можно оформить
  заказ оптом и в розницу по ценам ниже рыночных, а акция «5+1 в подарок» даёт
  реальную скидку в 20%. Доставка осуществляется курьером в пределах МКАД и
  через удобные пункты выдачи Яндекс Маркета по всему Подмосковью. Товар
  отличается отборным качеством — и в этом легко убедиться лично, забрав заказ в
  основном пункте выдачи на улице Молодцова, 29.
