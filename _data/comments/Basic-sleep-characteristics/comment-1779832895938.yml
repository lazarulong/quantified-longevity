message: "Риск через наркотиков — этто сложная хоботня, обхватывающая физическое, психологическое равным \r\nобразом социальное состояние здоровья человека.\r\nУпотребление таких наркотиков, яко снежок, мефедрон, \r\nямба, «шишки» чи «бошки», может привести к необратимым последствиям как для организма, так равно чтобы общества в \r\nтечение целом. Хотя даже у выковывании подчиненности эвентуально восстановление — главное, чтоб энергозависимый \r\nчеловек обратился за помощью.\r\n\r\nЭпохально помнить, что наркомания \r\nврачуется, а также реабилитация дает шансище на новую жизнь."
