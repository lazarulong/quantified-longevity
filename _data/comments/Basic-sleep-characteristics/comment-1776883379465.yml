message: >-
  ДентОптикс — специализированный интернет-магазин профессионального
  стоматологического оборудования для клиник и зуботехнических лабораторий.
  Каталог охватывает CAD/CAM системы, интраоральные и лабораторные сканеры,
  стоматологические микроскопы, бинокулярные лупы, 3D-принтеры, эндодонтическое
  оборудование и компьютерные томографы. Ищете <a
  href=https://dentoptics.ru/catalog/kompyuternye-tomografy/>стоматологические
  томографы</a>? На сайте dentoptics.ru представлены решения от ведущих мировых
  производителей с официальной гарантией и сервисным обслуживанием. Доставка по
  всей России, возможна покупка в рассрочку.
