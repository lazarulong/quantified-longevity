message: >-
  Веб-студия Standard-Landing.com с 2010 года разрабатывает продающие
  одностраничные сайты и настраивает контекстную рекламу в Яндекс Директ с
  фокусом на конверсии. Портфолио компании насчитывает более 1500 успешно
  запущенных проектов, каждый из которых решал задачу привлечения новых
  клиентов. Ищете <a href=http://standard-landing.com/>агентство лендингов</a>?
  На standard-landing.com можно заказать лендинг, настройку рекламы,
  SEO-продвижение, написание текстов и изготовление логотипов. Команда регулярно
  анализирует статистику и оптимизирует трафик, добиваясь максимальной отдачи от
  каждого вложенного рубля.
