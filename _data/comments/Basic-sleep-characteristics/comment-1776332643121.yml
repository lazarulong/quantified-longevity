message: "Риск через наркотиков — это комплексная хоботня, охватывающая физическое, \r\nпсихологическое равным образом общественное состояние здоровья человека.\r\n\r\nУтилизация подобных наркотиков, как \r\nснежок, мефедрон, гашиш, «шишки» или «бошки», может родить к необратимым результатам как чтобы организма, так (а) также чтобы среды в течение целом.\r\n\r\nНо даже при выковывании подчиненности возможно восстановление — ядро, чтоб зависимый явантроп обернулся за помощью.\r\nЭпохально запоминать, яко наркозависимость лечится, \r\nтакже помощь одаривает шанс на новую жизнь."
