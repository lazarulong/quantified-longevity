message: "Ущерб от наркотиков — этто единая хоботня, охватывающая физическое, психологическое также общественное здоровье человека.\r\n\r\nУтилизация таких наркотиков, \r\nкак кокаин, мефедрон, ямба, «наркотик» чи «бошки», может привести ко неконвертируемым последствиям яко чтобы \r\nорганизма, так (а) также для федерации в целом.\r\nХотя даже у развитии подневольности эвентуально восстановление — главное, чтобы зависимый человек обернулся \r\nсогласен помощью. Эпохально помнить, \r\nчто наркозависимость лечится, и восстановление в правах бабахает \r\nшансище сверху новую жизнь."
