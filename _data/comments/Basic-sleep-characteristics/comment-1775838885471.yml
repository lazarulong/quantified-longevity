message: >-
  Если вы давно искали выгодные тарифы на мобильную связь без переплат и
  очередей в салонах — «Планета Связи» именно то, что нужно. Компания предлагает
  эксклюзивные SIM-карты ведущих операторов: Билайн, Мегафон, Ростелеком и
  2tele, причём по ценам, которых просто не найти в обычных точках продаж. На
  сайте <a href=https://planetasv.ru/>https://planetasv.ru/</a> можно за пару
  минут подобрать тариф для интернета, звонков, видеонаблюдения, роутеров или
  трекеров. Подключение бесплатное, договор заключается напрямую с оператором, а
  служба поддержки отвечает в течение двух минут.
