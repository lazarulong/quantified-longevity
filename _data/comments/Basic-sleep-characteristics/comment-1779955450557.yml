message: "Вред через наркотиков — это комплексная хоботня, охватывающая \r\nфизическое, психическое (а) также соц состояние здоровья человека.\r\nУтилизация таковских наркотиков, как снежок, мефедрон, гашиш, «шишки» или «бошки», может родить ко необратимым следствиям яко \r\nдля организма, так равно для среды в течение целом.\r\nХотя даже при развитии связи эвентуально восстановление — \r\nядро, чтобы зависимый человек обратился за помощью.\r\nВажно помнить, что наркозависимость лечится, также помощь бабахает шанс на новейшую жизнь."
