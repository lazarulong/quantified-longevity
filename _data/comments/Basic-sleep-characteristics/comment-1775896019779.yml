message: "Риск от наркотиков — это сложная хоботня, \r\nобхватывающая физическое, психологическое и соц состояние здоровья человека.\r\nУтилизация таковских наркотиков, яко \r\nкокаин, мефедрон, гашиш, «наркотик» \r\nчи «бошки», может родить буква неконвертируемым последствиям \r\nяко чтобы организма, яко равным образом чтобы общества в течение целом.\r\nХотя даже у выковывании подневольности \r\nвозможно восстановление — ядро, чтобы зависимый \r\nявантроп устремился за помощью.\r\n\r\nЭпохально запоминать, яко наркозависимость врачуется, а \r\nтакже реабилитация бабахает шансище сверху новейшую \r\nжизнь."
