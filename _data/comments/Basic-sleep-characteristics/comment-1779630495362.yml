message: >-
  Современные стеклянные перегородки трансформируют офисное пространство,
  создавая атмосферу открытости и профессионализма. Компания предлагает полный
  спектр архитектурных решений для бизнес-интерьеров: от классических систем
  Standart с алюминиевым профилем до инновационных компактных конструкций Slim
  для узких проёмов. На <a href=https://wall.glass/>https://wall.glass/</a>
  представлены не только перегородки, но и дизайнерские светильники серий ORIO
  LINE и INI LED, акустические войлочные панели, которые обеспечивают комфортную
  звукоизоляцию. Производство и монтаж в Москве с гарантией качества.
