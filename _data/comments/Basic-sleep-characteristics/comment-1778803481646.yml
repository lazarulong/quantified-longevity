message: >-
  Покупка и продажа недвижимости в Ставропольском крае требует надёжного
  партнёра, который знает местный рынок изнутри. Агентство Arust под
  руководством Алексея сопровождает сделки под ключ: от подбора объекта до
  подписания документов. На сайте <a href=https://ar26.ru/>https://ar26.ru/</a>
  можно ознакомиться с актуальными предложениями и оставить заявку. Клиенты
  особо отмечают скорость оформления и личный подход — всё готово к приезду, без
  лишних ожиданий и бюрократических задержек.
