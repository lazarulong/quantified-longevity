message: >-
  SmartElectron — профессиональная команда разработчиков электроники,
  реализующая проекты любой технической сложности под ключ. Компания охватывает
  весь производственный цикл: от написания технического задания и проектирования
  схемотехники до создания печатных плат и выпуска серийной документации. Ищете
  <a href=https://smartelectron.ru/>разработка электронных приборов</a>?
  Заказать услуги и ознакомиться с реализованными проектами можно на
  smartelectron.ru — портфолио компании подтверждает высокий уровень экспертизы.
  По итогам работ заказчику передаётся полный документационный пакет и
  обеспечивается поддержка разработчика, что исключает снижение качества при
  долгосрочном серийном производстве.
