message: "проктолог в Москве – ведущий специалист.\r\nКонсультация онлайн. Диагностируем \r\nбез боли. Цена от 1500 ₽.\r\nлечение геморроя без операции – реальность в Москве.\r\nИнфракрасная коагуляция.\r\nПроцедура 15 минут. Гарантия от \r\nрецидива.\r\nколоноскопия под наркозом – забудьте о страхе и боли.\r\nМедикаментозный сон. Результат на \r\nруки через час. Цена от 8000 ₽.\r\n\r\nудаление полипов в кишечнике \r\n– во время колоноскопии. Гистология \r\nобязательна. Полип до 3 см – без госпитализации.\r\n\r\nВыписка через 2 часа.\r\nлечение анальной трещины – \r\nметодом лазерной вапоризации.\r\nПроводим ботулинотерапию.\r\nСохранение функции сфинктера.\r\nЦена лечения от 5000 ₽.\r\nлазерное удаление геморроидальных узлов – бесшовная технология.\r\nКомбинированная лазерная техника.\r\nСекс через 3 дня. Цена фиксированная за узел.\r\n\r\nмалоинвазивная проктология \r\n– современный стандарт лечения.\r\n\r\nЛазерная и радиоволна. Лечим геморрой \r\nи трещины. Экономия бюджета до 60%.\r\n\r\n\r\nсвищ прямой кишки лечение – \r\nмалоинвазивное иссечение с сохранением сфинктера.\r\nСохраняем анальный жом.\r\n\r\nОперация 40 минут. Бесплатная повторная консультация.\r\n\r\nректоцеле операция – трансанальная резекция.\r\nВозвращаем качество жизни. Без разрезов на животе.\r\nРеабилитация 3 недели.\r\nгастроскопия и колоноскопия за один день – экономия времени и наркоза.\r\nЕдиный сеанс медикаментозного сна.\r\nВходит очистка кишечника. Консультация гастроэнтеролога в подарок."
