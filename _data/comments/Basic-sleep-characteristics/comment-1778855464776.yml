message: >-
  Резинотехнические изделия — это та продукция, где качество материала напрямую
  определяет надёжность всей конструкции. Компания ПКФ «Нова» специализируется
  на изготовлении и поставке РТИ: рукавов, уплотнителей, прокладок и других
  изделий из резины под заказ. На <a
  href=https://pkfnova.ru/>https://pkfnova.ru/</a> можно оформить запрос на
  нестандартную продукцию, которую другие поставщики просто отказываются делать.
  Постоянные клиенты работают с компанией годами — и это лучшая характеристика
  надёжного партнёра.
