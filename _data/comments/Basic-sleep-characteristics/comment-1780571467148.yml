message: "<a href=https://dzen.ru/a/ahR_dQwDZhw3-hmp>болит поясница</a> Врач может не сказать вам этого прямо, но межпозвонковый диск любит движение больше, чем таблетки. Конечно, препараты имеют своё место. Но если выбирать между: •\tпостоянным сидением и хондропротекторами; •\tежедневной ходьбой без хондропротекторов, то для здоровья дисков второй вариант зачастую окажется полезнее. Почему так происходит на клеточном уровне — подробно разобрал в статье."
