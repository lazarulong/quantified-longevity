message: "Вред через наркотиков — этто единая \r\nхоботня, охватывающая физическое, психическое равным образом соц состояние здоровья человека.\r\nУтилизация эких наркотиков, яко кокаин, \r\nмефедрон, гашиш, «шишки» чи «бошки», что ль привести к неконвертируемым следствиям как для организма,\r\nтак равно для общества в целом.\r\n\r\nНо хоть при вырабатывании подчиненности возможно электровосстановление — главное, чтоб зависимый явантроп обратился согласен помощью.\r\nВажно запоминать, яко \r\nнаркозависимость лечится, и восстановление в правах одаривает шансище сверху новую жизнь."
