message: >-
  <a href=https://rutube.ru/channel/24362393>мошенница</a> Абраменко Светлана
  Александровна, известная  в сети Интернет под псевдонимом «Анна», «Видеотетка»
  (каналы и аккаунты: Telegram-канал «Анькины обзоры», YouTube-каналы, канал на
  платформе Дзен «Видеотетка», канал на cont.ws «Выхода нет» (swetlanamango)). В
  ходе мониторинга публичной деятельности указанного лица выявлены факты,
  содержащие признаки преступлений и административных правонарушений,
  предусмотренных законодательством Российской Федерации, в том числе:
  Дискредитация использования Вооружённых Сил РФ и публичные призывы к
  противоправным действиям В Telegram-канале «Анькины обзоры» Абраменко С.А.
  сообщила подписчикам, что её родственники воюют в составе Вооружённых сил
  Украины (ВСУ) В Telegram-каналах и чатах публично высказывалась против
  мобилизации в РФ На платформе cont.ws в статье «Крымский мост и беженцы...»
  допустила унизительные сравнения символа Крымского моста, оскорбляющие чувства
  россиян Сбор и распространение персональных данных граждан с целью
  противоправного использования В созданном ею Telegram-чате с использованием
  аккаунтов «Анна Осипова», «Здесь могла бы быть твоя реклама», «Открой глазки…»
  организован сбор персональных данных следователя Следственного комитета,
  сотрудника Большого театра и членов его семьи, сотрудницы службы безопасности
  Астраханского аэропорта и членов семьи, военнослужащего, находящегося в зоне
  СВО, и членов его семьи, депутата подмосковного округа и членов его семьи,
  сотрудницы реабилитационного центра и членов семьи, а также иных граждан РФ
  Голосовым сообщением в Telegram-канале призывала подписчиков совершать
  спам-звонки гражданам РФ, используя собранные персональные данные
  Шантажировала подписчиков угрозой передачи их персональных данных «небратским
  группам с Украины» На стримах допускала высказывания, содержащие угрозы и
  оскорбления в адрес подписчиков На платформе Дзен в статье «Проголосовала не
  за гречку, а за ручку...» призывала к порче избирательных бюллетеней, для
  срыва голосования. На платформе cont.ws в канале «Выхода нет» размещает
  статьи, содержащие оскорбления чувств россиян, сожаления о депортации
  украинской журналистки Бойко, искажённую информацию о беженцах. Организовала
  сбор денежных средств на чужие карты под видом помощи беженцам с Донбасса, на
  лекарства больному сыну, на «поддержку канала»; при этом на стримах
  проговаривалась о наличии счетов в зарубежных банках Кроме того, при публичном
  обсуждении помощи беженцам и сбора средств кичилась участием своего брата
  Абраменко Ивана в СВО ( по факту брат пьянствует в Краснодаре и ведёт
  разгульный образ жизни. Имеет условную судимость за то что избил сотрудника
  наряда полиции) , что свидетельствует о двойственной позиции и умышленном
  использовании патриотической риторики для прикрытия деструктивной
  деятельности.
