message: >-
  Белорусская компания «РазВикТрейд» специализируется на изготовлении пресс-форм
  и изделий из пластика уже более 10 лет. Полный производственный цикл включает
  проектирование, изготовление пресс-формы, серийное литьё и доставку готовых
  изделий клиенту. На <a
  href=https://press-forma.by/>https://press-forma.by/</a> доступен бесплатный
  расчёт стоимости проекта. Площадка в 1000 кв.м. с 24 единицами оборудования
  позволяет производить до 1,5 млн пластиковых изделий ежемесячно. По сравнению
  с китайскими поставщиками клиенты получают рост чистой прибыли в 2–3 раза.
