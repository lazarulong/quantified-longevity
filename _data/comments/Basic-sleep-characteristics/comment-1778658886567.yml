message: >-
  Glassway — специализированный поставщик, выстроивший прямые партнёрства с
  ведущими заводами отделочной отрасли. Ассортимент охватывает подвесные
  потолки, перегородки, алюминиевые двери, смарт-стекло, зенитные фонари и
  витринные конструкции. Ищете <a href=https://glassway.group/>кассетные
  потолки</a>? На glassway.group представлен обширный каталог с актуальными
  ценами — прямые поставки с заводов обеспечивают конкурентную стоимость на весь
  ассортимент. Glassway успешно воплощает проекты разного масштаба — от
  стандартных офисных пространств до сложных авторских объектов.
