message: >-
  POLITEKA — информационное агентство с чёткой редакционной структурой —
  публикует материалы о политике, экономике, обществе, культуре и криминале без
  компромиссов с фактами и без редакционной мягкотелости. Редакция агентства
  разбирает технологические изменения, международные эскалации и экономические
  схемы с опорой на проверенные факты и первичную документацию. Получайте
  независимую аналитику на <a
  href=https://politeka.org/>https://politeka.org/</a> — украинское
  информационное агентство для аудитории требующей глубокого и честного
  осмысления событий. Авторские материалы и глубокая аналитика расширяют
  редакционный формат и делают агентство незаменимым источником для читателей
  ценящих содержательную журналистику.
