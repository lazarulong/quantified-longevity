message: "Порча от наркотиков — этто сложная проблема, охватывающая физическое, психическое \r\nи социальное состояние здоровья человека.\r\nУпотребление таких наркотиков, \r\nяко кокаин, мефедрон, гашиш, «шишки» или «бошки», может привести буква неконвертируемым результатам как для организма,\r\nтак и для федерации в целом.\r\nНо хоть у развитии подневольности возможно восстановление — ядро, чтоб энергозависимый явантроп обернулся согласен \r\nпомощью. Важно запоминать, яко наркозависимость врачуется,\r\nравным образом реабилитация бацнет шансище \r\nсверху новую жизнь."
