message: >-
  Мебельная фабрика «Подольск» производит кухни и шкафы-купе под заказ для
  клиентов из Москвы и Подмосковья. Производство использует качественные
  материалы и современную фурнитуру что обеспечивает долговечность каждого
  изделия. Клиентам доступен весь комплекс услуг: от замера и проектирования до
  доставки и сборки мебели на месте. Партнёром фабрики по поставке оборудования
  выступает <a href=https://mf-podolsk.ru/>https://mf-podolsk.ru/</a> — надёжный
  поставщик металлообрабатывающих станков и инструментов. Воспользоваться
  услугами фабрики просто — достаточно собрать проект в онлайн-конструкторе на
  сайте.
