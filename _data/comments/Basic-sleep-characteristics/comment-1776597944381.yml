message: >-
  Иркутский ресторан «Пекинская Утка» — заведение, в котором подлинные традиции
  китайской кухни соединяются с профессиональным обслуживанием. В меню
  представлен широкий выбор китайских блюд: морепродукты, утиное и говяжье мясо,
  свинина, овощи и фирменные соусы. <a
  href=https://pekin-utka.ru/>https://pekin-utka.ru/</a> предлагает
  онлайн-бронирование столика и удобную доставку. Меню сочетает классику и
  авторские позиции, а ценовой диапазон остаётся доступным для большинства
  гостей.
