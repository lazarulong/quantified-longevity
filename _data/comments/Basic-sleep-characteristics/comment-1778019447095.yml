message: >-
  Москва открывается совершенно иначе, когда смотришь на неё с воды:
  величественные набережные, сталинские высотки и современные небоскрёбы Сити
  складываются в панораму, которую невозможно увидеть ни из окна метро, ни с
  автомобильной эстакады. Сервис <a
  href=https://moscowwaterways.ru/>https://moscowwaterways.ru/</a> предлагает
  речные прогулки и маршруты по Москве-реке в сезоне навигации 2026 года — с
  удобным расписанием, регулярными отправлениями каждые 15–30 минут и причалами
  в шаговой доступности от метро. Это одновременно отдых, впечатления и полная
  свобода от городских пробок.
