message: >-
  «Делай Промо» — комплексная SaaS-платформа, которая даёт брендам и агентствам
  возможность самостоятельно запускать чековые акции, программы лояльности и
  системы мотивации продавцов. В распоряжении брендов и агентств — конструктор
  лендингов, OCR-распознавание чеков, чат-боты для Telegram и VK, кодовые
  механики с антибрутфорс-защитой и сквозная аналитика с экспортом в Excel,
  объединённые на одной платформе. На <a
  href=http://makerpromo.ru/>http://makerpromo.ru/</a> уже зарегистрировано
  свыше 24 000 чеков и 18 000 активных пользователей. Проект находится на стадии
  закрытого бета-теста и предлагает участникам специальные условия подключения.
