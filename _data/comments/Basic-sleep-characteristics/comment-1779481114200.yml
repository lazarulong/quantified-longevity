message: >-
  Портал JAY — база знаний и каталог статей по всем направлениям — публикует
  материалы о политике, экономике, бизнесе, технологиях, здоровье, строительстве
  и культуре без редакционных уступок и информационного балласта. Редакция
  портала создаёт прикладные материалы — от детальных профессиональных
  рекомендаций до глубоких аналитических обзоров отраслевых тенденций —
  основываясь на проверенных фактах и экспертной базе. Расширяйте кругозор и
  находите нужную информацию на <a
  href=https://jay.com.ua/>https://jay.com.ua/</a> — многопрофильный портал для
  читателей ценящих структурированные знания и конкретную подачу. Тематические
  разделы охватывают широкий спектр запросов и превращают ресурс в надёжный
  справочник для украинской аудитории.
