message: >-
  Чистая вода дома — не роскошь, а норма, которую теперь легко обеспечить. PWS
  создаёт бытовые системы очистки воды без расходных картриджей и импортных
  зависимостей. На <a
  href=https://pws.world/bytovye-ustanivki>https://pws.world/bytovye-ustanivki</a>
  представлены установки серии КСВ, которые снижают жёсткость в 10–20 раз,
  устраняют железо, запах и мутность. Системы проектируются под состав воды в
  вашем регионе. Инженеры компании сами консультируют клиентов и подбирают
  оптимальное решение под любой бюджет.
