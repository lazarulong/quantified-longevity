message: >-
  Компания «Строй Комплект» работает в лесной отрасли с 1999 года и предлагает
  пиломатериалы собственного производства напрямую покупателям Москвы. Заготовка
  древесины ведётся в экологически чистых северных регионах, а ежемесячный
  выпуск превышает 1500 кубометров хвойной продукции. На сайте <a
  href=https://brusdoskamsk.ru/>https://brusdoskamsk.ru/</a> представлен широкий
  ассортимент: доска, брус, вагонка, планкен, фанера, блок-хаус и элементы
  лестниц. Переработка сырья осуществляется на европейском оборудовании, что
  обеспечивает стабильно высокое качество. Работают ежедневно с 8:00 до 20:00.
