message: >-
  Гастрономический круиз по Москве-реке — это не просто ужин с видом, это целое
  событие, которое запоминается надолго. Сервис <a
  href=https://riverwalktickets.ru/>https://riverwalktickets.ru/</a> за 10 лет
  работы на рынке речного флота собрал более 100 маршрутов на любой вкус и
  формат: романтический вечер на двоих, семейный обед или корпоративная
  прогулка. Команда лично отбирает теплоходы, проверяет качество кухни и сервиса
  — именно поэтому более полумиллиона гостей уже выбрали этот сервис.
  Отправляйтесь в плавание от Воробьёвых гор, Парка Горького или Зарядья и
  откройте Москву с новой, водной стороны!
