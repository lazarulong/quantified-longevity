message: >-
  Looking for a crypto exchange API for websites? Visit <a
  href=https://cryptosdk.io/>https://cryptosdk.io/</a> and you'll find CryptoSDK
  – a crypto exchange API for websites, apps, wallets, and digital services that
  require a built-in crypto exchange within their own product flow. Instead of
  sending users to a separate frontend, the integration keeps routing, rate
  search, verification, validation, order creation, and status tracking within a
  single product.
