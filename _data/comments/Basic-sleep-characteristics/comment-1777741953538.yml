message: >-
  Москва открывается совершенно иначе, когда смотришь на неё с воды: панорама
  Кремля, мосты и набережные создают ощущение живого кино, где главный герой —
  сам город. Именно это ощущение дарит <a
  href=https://moscowcruise.ru/>https://moscowcruise.ru/</a> — сервис, который с
  2018 года помогает тысячам москвичей и туристов находить лучшие прогулки на
  теплоходе по Москве-реке. За более чем пять лет работы компания обслужила
  свыше 10 000 довольных клиентов и работает круглосуточно, чтобы каждый смог
  выбрать маршрут в удобное время!
