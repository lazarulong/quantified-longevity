message: >-
  Чистая вода — это не роскошь, а основа здоровья, производительности и
  экономии. Российская компания PWS специализируется на системах водоочистки для
  любых задач: от бытовых фильтров до мощных промышленных установок и решений
  для сельского хозяйства. На сайте <a
  href=https://pws.world/>https://pws.world/</a> представлен полный спектр
  оборудования, разработанного с учётом отечественных норм и реальных условий
  эксплуатации. Каждая система проектируется индивидуально, обеспечивая
  максимальную эффективность, простоту обслуживания и быструю окупаемость для
  каждого конкретного объекта.
