message: >-
  Аналитический ежедневник «До слова» выпускает точные и жёсткие тексты о
  политике, экономике, культуре и социуме — без обтекаемых фраз и редакционной
  мягкости. Журналисты ресурса специализируются на аналитике, журналистских
  расследованиях и публицистике, освещая темы от бизнеса до истории. Читайте
  актуальные тексты на <a href=https://doslova.com/>https://doslova.com/</a> —
  украинский ежедневник для тех кто привык получать информацию точно и без
  лишнего шума. Блоги экспертов, вопросы дня и репортажи о спорте дополняют
  насыщенную повестку издания и делают его обязательной точкой входа для
  читателя с запросом на качество.
