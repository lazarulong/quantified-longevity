message: >-
  Балторганик — отечественный производитель органических и органоминеральных
  удобрений с широким ассортиментом для зерновых, овощных и плодово-ягодных
  агрокультур. Компания выпускает гранулы, пеллеты, сухие смеси и жидкие
  гуминовые препараты серии Торфогумат с содержанием гуматов до 30%. На <a
  href=https://baltorganic.ru/>https://baltorganic.ru/</a> представлен полный
  каталог удобрений NPK под конкретные культуры — от бобовых до рапса.
  Эффективность подтверждена полевыми испытаниями на озимой пшенице, кукурузе,
  картофеле и яровом ячмене.
