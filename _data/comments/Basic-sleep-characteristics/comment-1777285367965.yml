message: >-
  Портал «Спільно» — майданчик громадянського суспільства — выпускает тексты о
  политике, криминале, коррупции, культуре и общественной жизни без смягчений и
  лишних оговорок. Журналисты и авторы портала проводят детальные расследования
  коррупционных цепочек и теневых финансовых схем основываясь на первичных
  документах и проверенных данных. Следите за независимой гражданской
  журналистикой на <a href=https://spilno.net/>https://spilno.net/</a> —
  украинский портал для читателей требующих честного анализа и прямой
  гражданской позиции. Авторские блоги и колонки органично дополняют новостной
  контент и делают портал полноценной площадкой для открытого гражданского
  диалога.
