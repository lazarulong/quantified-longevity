message: >-
  Экологическое законодательство становится всё строже, а штрафы за нарушения —
  всё ощутимее, поэтому грамотное сопровождение бизнеса в сфере экологии сегодня
  не роскошь, а необходимость. Компания EcoDok из Владимира предлагает полный
  спектр услуг: разработку экологической документации, аутсорсинг эколога,
  подготовку к проверкам надзорных органов и производственный экологический
  контроль — на сайте <a href=https://ecodok.ru/>https://ecodok.ru/</a> можно
  подробно ознакомиться с каждым направлением. Специалисты компании также
  разработали обучающий курс и методическое пособие для экологов, что делает
  EcoDok не просто исполнителем, а настоящим экспертным партнёром для вашего
  предприятия.
