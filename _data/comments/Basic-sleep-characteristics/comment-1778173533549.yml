message: >-
  Информационное агентство Vgolos публикует материалы по ключевым направлениям —
  политика, экономика, бизнес, технологии, здоровье и криминал без редакционных
  купюр и информационного шума. Авторы агентства оперативно реагируют на события
  и подают факты без домыслов — от судебных расследований до обзоров
  потребительского рынка. Читайте проверенные новости на <a
  href=https://vgolos.org/>https://vgolos.org/</a> — украинское информационное
  агентство для аудитории ценящей достоверность и оперативность. Культура, жизнь
  и технологии органично дополняют жёсткую новостную повестку и делают ресурс
  полноценным медиаисточником на каждый день.
