message: >-
  Мобильные установки по очистке воды от компании PWS — это инженерное решение
  для объектов, где невозможна стационарная инфраструктура. Компактные модульные
  системы монтируются на базе контейнеров или прицепов, обеспечивая полный цикл
  водоподготовки в полевых условиях, на строительных площадках или временных
  производствах. На сайте <a
  href=https://pws.world/mobilnye-ustanovki>https://pws.world/mobilnye-ustanovki</a>
  представлены готовые проекты с индивидуальной настройкой под химический состав
  источника — скважины, водопровода или оборотного контура. Каждая установка
  соответствует СанПиН и техрегламентам РФ, что гарантирует быстрое согласование
  и надежную эксплуатацию без простоев.
